<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mattekompis</title>

<style>

*{
user-select:none;
-webkit-user-select:none;
-webkit-touch-callout:none;
box-sizing:border-box;
}

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:#7ecbff;
}

/* SPEL */

#game{
position:relative;
height:65vh;
background:linear-gradient(#7ecbff,#c8f6ff);
overflow:hidden;
}

#world{
position:absolute;
bottom:0;
left:0;
height:100%;
width:200000px;
}

.ground{
position:absolute;
bottom:0;
height:80px;
width:200000px;
background:#2ecc71;
}

/* HINDER */

.obstacle{
position:absolute;
bottom:80px;
width:60px;
height:60px;
background:#8e44ad;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
}

/* FLAGGA */

.flag{
position:absolute;
bottom:80px;
font-size:70px;
}

/* SPELARE */

#player{
position:absolute;
bottom:80px;
left:40%;
width:110px;
height:110px;
}

#playerSprite{
width:110px;
height:110px;
background:url("player-idle.PNG");
background-size:contain;
background-repeat:no-repeat;
}

.walk{
background:url("player-walk.PNG");
background-size:auto 110px;
animation:walk .6s steps(6) infinite;
}

@keyframes walk{
from{background-position:0}
to{background-position:-660px}
}

/* HUND */

#dog{
position:absolute;
bottom:80px;
left:30%;
width:80px;
}

#dog img{
width:100%;
}

/* KONTROLLER */

#controls{
display:flex;
justify-content:center;
gap:30px;
padding:15px;
background:#1c2e4a;
}

button{
font-size:28px;
padding:15px 20px;
border-radius:12px;
border:none;
background:#2f4b7c;
color:white;
}

/* MATTE */

#math{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
}

.grid{
display:grid;
grid-template-columns:60px 60px 60px;
grid-template-rows:60px 60px 60px 60px;
background:white;
padding:10px;
}

.cell{
border:2px solid black;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
}

input{
width:100%;
height:100%;
border:none;
font-size:28px;
text-align:center;
}

.green{background:#c8f7c5;}
.blue{background:#c5d9ff;}
.correct{background:#b8ffb8;}
.wrong{background:#ffb8b8;}

#progress{
position:absolute;
top:10px;
left:10px;
background:white;
padding:6px 10px;
border-radius:6px;
}

/* FIRANDE */

.fire{
position:absolute;
font-size:30px;
}

</style>
</head>

<body>

<div id="game">

<div id="progress">0 / 5</div>

<div id="world">
<div class="ground"></div>
</div>

<div id="player">
<div id="playerSprite"></div>
</div>

<div id="dog">
<img src="dog-sit.png">
</div>

</div>

<div id="controls">
<button id="right">➡️</button>
</div>

<div id="math">
<div>
<div class="grid" id="grid"></div>
<button onclick="check()">Klar</button>
</div>
</div>

<script>

/* SPELVARIABLER */

let worldX=0
let moving=false
let paused=false
let finished=false

let tasks=["39+15","63+28","58+34","37+45","44+17"]

let taskIndex=0
let correct=0

let nextSpawn=600

const world=document.getElementById("world")
const sprite=document.getElementById("playerSprite")
const player=document.getElementById("player")

/* GENERERA BANA */

generateWorld()

function generateWorld(){

for(let i=0;i<20;i++){

let o=document.createElement("div")
o.className="obstacle"
o.style.left=nextSpawn+"px"
o.innerText="?"
world.appendChild(o)

nextSpawn+=600

}

}

/* KONTROLLER */

right.onpointerdown=()=>{
moving=true
sprite.classList.add("walk")
}

right.onpointerup=()=>{
moving=false
sprite.classList.remove("walk")
}

/* MATTE */

function showMath(){

if(finished) return

paused=true

let q=tasks[taskIndex]

let [a,b]=q.split("+").map(Number)

correct=a+b

buildGrid(a,b)

math.style.display="flex"

}

/* BYGG UPPSTÄLLNING */

function buildGrid(a,b){

const grid=document.getElementById("grid")
grid.innerHTML=""

const aT=Math.floor(a/10)
const aO=a%10
const bT=Math.floor(b/10)
const bO=b%10

const cells=[
"", "", "",
"", aT, aO,
"+", bT, bO,
"", "i", "i"
]

cells.forEach((v,i)=>{

let c=document.createElement("div")
c.className="cell"

if(i===5||i===8)c.classList.add("green")
if(i===4||i===7)c.classList.add("blue")

if(v==="i"){

let inp=document.createElement("input")
inp.maxLength=1
inp.inputMode="numeric"

c.appendChild(inp)

}else{

c.textContent=v

}

grid.appendChild(c)

})

}

/* KONTROLLERA SVAR */

function check(){

let nums=[...document.querySelectorAll("input")].map(i=>i.value).join("")
let val=parseInt(nums)

if(val===correct){

document.querySelectorAll("input").forEach(i=>i.classList.add("correct"))

setTimeout(()=>{

taskIndex++
progress.innerText=taskIndex+" / "+tasks.length

math.style.display="none"
paused=false

if(taskIndex>=tasks.length){

finished=true
spawnFlag()

}

},400)

}else{

document.querySelectorAll("input").forEach(i=>i.classList.add("wrong"))

setTimeout(()=>{
document.querySelectorAll("input").forEach(i=>i.classList.remove("wrong"))
},400)

}

}

/* FLAGGA */

function spawnFlag(){

let flag=document.createElement("div")
flag.className="flag"
flag.style.left=(nextSpawn+200)+"px"
flag.innerText="🏁"

world.appendChild(flag)

fireworks()

}

/* FYRVERKERI */

function fireworks(){

for(let i=0;i<25;i++){

let star=document.createElement("div")
star.className="fire"
star.innerText="✨"

star.style.left=(window.innerWidth/2+Math.random()*200-100)+"px"
star.style.top=(window.innerHeight/2+Math.random()*200-100)+"px"

document.body.appendChild(star)

setTimeout(()=>star.remove(),800)

}

}

/* SPELLOOP */

function loop(){

if(!paused){

if(moving) worldX-=4

world.style.left=worldX+"px"

const pr=player.getBoundingClientRect()

document.querySelectorAll(".obstacle").forEach(o=>{

const r=o.getBoundingClientRect()

if(pr.right>r.left && pr.left<r.right){

showMath()
o.remove()

}

})

}

requestAnimationFrame(loop)

}

loop()

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mattekompis</title>

<style>

/* RESET */
*{
margin:0;
box-sizing:border-box;
-webkit-user-select:none;
-webkit-tap-highlight-color:transparent;
}

button{
-webkit-appearance:none;
appearance:none;
outline:none;
border:none;
}

/* BODY */
body{
overflow:hidden;
background:linear-gradient(#7ecbff,#c8f6ff);
}

/* SPEL */
#game{
position:relative;
height:65vh;
overflow:hidden;
}

/* MARK */
#ground{
position:absolute;
bottom:0;
height:80px;
width:100%;
background:#2ecc71;
}

/* SPELARE */
#player{
position:absolute;
left:40%;
bottom:80px;
width:160px;
height:160px;
display:flex;
align-items:flex-end;
}

/* 🔥 FIXAD SPRITE */
#playerSprite{
width:100%;
height:100%;
background:url("player-idle.PNG") center bottom no-repeat;
background-size:contain;

/* 🔥 trycker ner gubben så fötterna träffar mark */
transform: translateY(20px);
}

/* HUND */
#dog{
position:absolute;
width:60px;
height:60px;
display:flex;
align-items:flex-end;
}

#dog img{
width:100%;
height:100%;
object-fit:contain;
transform: translateY(10px);
}

/* KONTROLLER */
#controls{
display:flex;
justify-content:center;
gap:20px;
background:#1c2e4a;
padding:10px;
}

button{
font-size:28px;
padding:12px 18px;
border-radius:10px;
background:#2f4b7c;
color:white;
}

</style>
</head>

<body>

<div id="game">

<div id="ground"></div>

<div id="player">
<div id="playerSprite"></div>
</div>

<div id="dog">
<img id="dogImg" src="dog-sit.png">
</div>

</div>

<div id="controls">
<button id="left">⬅️</button>
<button id="jump">⬆️</button>
<button id="right">➡️</button>
</div>

<script>

/* STATE */
let vx = 0
let vy = 0
let move = 0
let onGround = true

const player = document.getElementById("player")
const dog = document.getElementById("dog")

/* INPUT */
function stopMove(){
move = 0
}

right.addEventListener("pointerdown", ()=>move = 1)
left.addEventListener("pointerdown", ()=>move = -1)

right.addEventListener("pointerup", stopMove)
left.addEventListener("pointerup", stopMove)

window.addEventListener("pointerup", stopMove)
window.addEventListener("touchend", stopMove)
window.addEventListener("blur", stopMove)

/* HOPP */
jump.addEventListener("pointerdown", ()=>{
if(onGround){
vy = 14
onGround = false
}
})

/* LOOP */
function loop(){

/* rörelse */
vx = move * 5

/* gravity */
vy -= 0.7

let bottom = parseFloat(player.style.bottom || 80)
bottom += vy

/* mark */
if(bottom <= 80){
bottom = 80
vy = 0
onGround = true
}

/* apply */
player.style.bottom = bottom + "px"

/* hund */
dog.style.left = (player.offsetLeft - 60) + "px"
dog.style.bottom = bottom + "px"

requestAnimationFrame(loop)
}

loop()

</script>

</body>
</html>

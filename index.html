<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Mattekompis</title>

<style>

*{
-webkit-user-select:none;
user-select:none;
-webkit-touch-callout:none;
box-sizing:border-box;
}

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:#7ecbff;
}

button{
-webkit-tap-highlight-color:transparent;
touch-action:manipulation;
}

#startScreen{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:#7ecbff;
gap:15px;
}

#game{
position:relative;
height:60vh;
background:linear-gradient(#7ecbff,#c8f6ff);
overflow:hidden;
}

#world{
position:absolute;
bottom:0;
left:0;
height:100%;
width:200000px;
}

.ground{
position:absolute;
bottom:0;
height:80px;
width:200000px;
background:#2ecc71;
}

.tree{position:absolute;bottom:80px;font-size:50px;}
.flower{position:absolute;bottom:80px;font-size:24px;}

.hill{
position:absolute;
bottom:80px;
width:240px;
height:120px;
background:#27ae60;
border-radius:240px 240px 0 0;
}

.obstacle{
position:absolute;
bottom:80px;
width:60px;
height:60px;
background:#8e44ad;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
}

#player{
position:absolute;
bottom:80px;
left:40%;
width:140px;
height:140px;
}

#playerSprite{
width:140px;
height:140px;
background:url("player-idle.PNG");
background-size:contain;
background-repeat:no-repeat;
}

.walk{
background:url("player-walk.PNG");
background-size:auto 140px;
animation:walk .6s steps(6) infinite;
}

@keyframes walk{
from{background-position:0}
to{background-position:-840px}
}

#dog{
position:absolute;
bottom:80px;
left:30%;
width:90px;
}

#dog img{
width:100%;
}

#controls{
display:flex;
justify-content:center;
gap:30px;
padding:15px;
background:#1c2e4a;
}

button{
font-size:30px;
padding:15px 20px;
border-radius:12px;
border:none;
background:#2f4b7c;
color:white;
}

#math{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
}

#mathBox{
background:white;
padding:30px;
border-radius:12px;
text-align:center;
}

input{
font-size:30px;
width:120px;
text-align:center;
}

#progress{
position:absolute;
top:10px;
left:10px;
background:white;
padding:6px 10px;
border-radius:6px;
}

</style>
</head>

<body>

<div id="startScreen">
<img src="icon.PNG" width="160">
<h1>Mattekompis</h1>
<button onclick="startGame()">Starta</button>
</div>

<div id="game">

<div id="progress">0 / 5</div>

<div id="world">
<div class="ground"></div>
</div>

<div id="player">
<div id="playerSprite"></div>
</div>

<div id="dog">
<img id="dogImg" src="dog-sit.png">
</div>

</div>

<div id="controls">
<button id="left">⬅️</button>
<button id="jump">⬆️</button>
<button id="right">➡️</button>
</div>

<div id="math">
<div id="mathBox">
<h2 id="question"></h2>
<input id="answer">
<script>
answer.addEventListener("keydown",e=>{
if(e.key==="Enter") check()
})
</script>
<br><br>
<button onclick="check()">Klar</button>
</div>
</div>

<audio id="music" src="Music.mp3" loop></audio>
<audio id="jumpSound" src="Jump.mp3"></audio>
<audio id="correctSound" src="Correct.mp3"></audio>

<script>

let worldX=0
let moving=false
let vy=0
let onGround=true
let paused=false

let tasks=["39+15","63+28","58+34","37+45","44+17"]

let taskIndex=0
let correct=0

let nextSpawn=800

const world=document.getElementById("world")
const player=document.getElementById("player")
const sprite=document.getElementById("playerSprite")
const dog=document.getElementById("dog")
const dogImg=document.getElementById("dogImg")

function startGame(){

document.getElementById("startScreen").style.display="none"

music.volume=.3
music.play()

generateWorld()

}

function generateWorld(){

for(let i=0;i<40;i++){
spawnDecoration()
spawnObstacle()
}

}

function spawnDecoration(){

let x=nextSpawn+Math.random()*300
let r=Math.random()

if(r<0.33){

let t=document.createElement("div")
t.className="tree"
t.style.left=x+"px"
t.innerText="🌳"
world.appendChild(t)

}else if(r<0.66){

let f=document.createElement("div")
f.className="flower"
f.style.left=x+"px"
f.innerText="🌼"
world.appendChild(f)

}else{

let h=document.createElement("div")
h.className="hill"
h.style.left=x+"px"
world.appendChild(h)

}

}

function spawnObstacle(){

let o=document.createElement("div")
o.className="obstacle"
o.style.left=nextSpawn+"px"
o.innerText="?"
world.appendChild(o)

nextSpawn+=600

}

right.onpointerdown=()=>{
moving=true
sprite.classList.add("walk")
dogImg.src="dog-walk.png"
}

right.onpointerup=()=>{
moving=false
sprite.classList.remove("walk")
dogImg.src="dog-sit.png"
}

jump.onpointerdown=()=>{
if(onGround){
vy=12
onGround=false
jumpSound.play()
}
}

function showMath(){setTimeout(()=>{
document.getElementById("answer").focus()
},100)

paused=true

let q=tasks[taskIndex]

let p=q.split("+")
correct=parseInt(p[0])+parseInt(p[1])

question.innerText=q
math.style.display="flex"

}

function check(){

const value = parseInt(document.getElementById("answer").value)

if(value === correct){

document.getElementById("correctSound").play()

document.getElementById("math").style.display="none"

taskIndex++

document.getElementById("progress").innerText =
taskIndex + " / " + tasks.length

document.getElementById("answer").value=""

paused=false

}else{

// visuell feedback
document.getElementById("answer").style.background="#ffd6d6"

setTimeout(()=>{
document.getElementById("answer").style.background="white"
},500)

}

}

function loop(){

if(!paused){

if(moving) worldX-=4

vy-=0.6

let bottom=parseFloat(player.style.bottom||80)
bottom+=vy

if(bottom<=80){
bottom=80
vy=0
onGround=true
}

player.style.bottom=bottom+"px"

dog.style.left=(player.offsetLeft-120)+"px"

world.style.left=worldX+"px"

if(-worldX+window.innerWidth>nextSpawn-1000){

spawnDecoration()
spawnObstacle()

}

const pr=player.getBoundingClientRect()

document.querySelectorAll(".obstacle").forEach(o=>{

const r=o.getBoundingClientRect()

if(pr.right>r.left && pr.left<r.right){

showMath()
o.remove()

}

})

}

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>

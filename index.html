<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mattekompis – Grafikläge</title>

<style>

body{margin:0;overflow:hidden;background:linear-gradient(#7ecbff,#c8f6ff);font-family:sans-serif}

/* SPEL */

#game{position:relative;height:65vh;overflow:hidden}
#world{position:absolute;bottom:0;left:0;height:100%;width:100000px}

.ground{position:absolute;bottom:0;height:80px;width:100000px;background:#2ecc71}

/* KULLAR */

.hill{
position:absolute;
width:220px;
height:120px;
background:#27ae60;
border-radius:200px 200px 0 0;
}

/* VATTEN */

.water{
position:absolute;
bottom:0;
height:80px;
background:#3498db;
}

/* BÅT */

.boat{
position:absolute;
bottom:80px;
font-size:40px;
}

/* SPELARE */

#player{
position:absolute;
left:40%;
bottom:80px;
width:110px;
height:110px;
}

#playerSprite{
width:100%;
height:100%;
background:url("player-idle.PNG") center/contain no-repeat;
}

.walk{
background:url("player-walk.PNG");
background-size:auto 110px;
animation:walk .6s steps(6) infinite;
}

@keyframes walk{
from{background-position:0}
to{background-position:-660px}
}

/* HUND */

#dog{
position:absolute;
bottom:80px;
width:80px;
}

#dog img{width:100%}

/* DEKOR */

.tree{position:absolute;font-size:40px}
.animal{position:absolute;font-size:30px}

</style>
</head>

<body>

<div id="game">
<div id="world"><div class="ground"></div></div>

<div id="player"><div id="playerSprite"></div></div>
<div id="dog"><img id="dogImg" src="dog-sit.png"></div>
</div>

<div style="display:flex;justify-content:center;gap:20px;background:#1c2e4a;padding:10px">
<button id="jump">⬆️</button>
<button id="right">➡️</button>
</div>

<audio id="music" src="Music.mp3" loop></audio>
<audio id="jumpSound" src="Jump.mp3"></audio>

<script>

/* VARIABLER */

let worldX=0
let vy=0
let onGround=true
let moving=false

const world=document.getElementById("world")
const player=document.getElementById("player")
const sprite=document.getElementById("playerSprite")
const dog=document.getElementById("dog")
const dogImg=document.getElementById("dogImg")

const music=document.getElementById("music")
const jumpSound=document.getElementById("jumpSound")

let nextSpawn=400

const animals=["🐒","🦉","🐝","🦄","🐜","🐙","🐳","🦀","🦑","🦕","🦖","🐍","🐅","🐆","🦓","🦍","🦧","🦒","🦘","🦌","🐈","🐩","🐓","🦩"]

generateWorld()

/* GENERERA VÄRLD */

function generateWorld(){

for(let i=0;i<60;i++){

spawnHill()
spawnWater()
spawnDecor()

nextSpawn+=300

}

}

function spawnHill(){

if(Math.random()<0.4){

let h=document.createElement("div")
h.className="hill"
h.style.left=nextSpawn+"px"
h.style.bottom="80px"

world.appendChild(h)

}

}

function spawnWater(){

if(Math.random()<0.3){

let width=120+Math.random()*200

let w=document.createElement("div")
w.className="water"
w.style.left=nextSpawn+"px"
w.style.width=width+"px"

world.appendChild(w)

/* båt */

if(width>200){

let b=document.createElement("div")
b.className="boat"
b.innerText="⛵"
b.style.left=(nextSpawn+width/2-20)+"px"

world.appendChild(b)

}

}

}

function spawnDecor(){

/* träd */

if(Math.random()<0.5){

let t=document.createElement("div")
t.className="tree"
t.innerText="🌳"
t.style.left=nextSpawn+"px"
t.style.bottom="80px"

world.appendChild(t)

}

/* djur */

if(Math.random()<0.5){

let a=document.createElement("div")
a.className="animal"
a.innerText=animals[Math.floor(Math.random()*animals.length)]
a.style.left=(nextSpawn+50)+"px"
a.style.bottom="80px"

world.appendChild(a)

}

}

/* KONTROLLER */

right.onpointerdown=()=>{
moving=true
sprite.classList.add("walk")
dogImg.src="dog-walk.png"
music.play().catch(()=>{})
}

right.onpointerup=()=>{
moving=false
sprite.classList.remove("walk")
dogImg.src="dog-sit.png"
}

jump.onpointerdown=()=>{
if(onGround){
vy=14
onGround=false
jumpSound.play()
}
}

/* SPELLOOP */

function loop(){

if(moving) worldX-=4

vy-=0.6

let bottom=parseFloat(player.style.bottom||80)
bottom+=vy

if(bottom<=80){
bottom=80
vy=0
onGround=true
}

player.style.bottom=bottom+"px"
world.style.left=worldX+"px"

dog.style.left=(player.offsetLeft-90)+"px"

/* KOLLISION VATTEN */

const pr=player.getBoundingClientRect()

document.querySelectorAll(".water").forEach(w=>{

const r=w.getBoundingClientRect()

if(pr.bottom>=r.top && pr.right>r.left && pr.left<r.right){

/* fall */
vy=-10

}

})

requestAnimationFrame(loop)

}

loop()

</script>
</body>
</html>

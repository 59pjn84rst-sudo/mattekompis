<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mattekompis</title>

<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none}

body{
overflow:hidden;
font-family:sans-serif;
background:linear-gradient(#7ecbff,#c8f6ff);
}

/* SPEL */

#game{
position:relative;
height:65vh;
overflow:hidden;
}

#world{
position:absolute;
bottom:0;
left:0;
height:100%;
width:50000px;
}

.ground{
position:absolute;
bottom:0;
height:80px;
width:50000px;
background:#2ecc71;
}

/* KULLAR */

.hill{
position:absolute;
bottom:80px;
width:220px;
height:120px;
background:#27ae60;
border-radius:200px 200px 0 0;
}

/* HÅL */

.pit{
position:absolute;
bottom:0;
width:140px;
height:80px;
background:#7ecbff;
}

/* SPELARE */

#player{
position:absolute;
left:40%;
bottom:80px;
width:110px;
height:110px;
}

#playerSprite{
width:110px;
height:110px;
background:url("player-idle.PNG");
background-size:contain;
background-repeat:no-repeat;
}

.walk{
background:url("player-walk.PNG");
background-size:auto 110px;
animation:walk .6s steps(6) infinite;
}

@keyframes walk{
from{background-position:0}
to{background-position:-660px}
}

/* HUND */

#dog{
position:absolute;
bottom:80px;
width:80px;
}

#dog img{width:100%}

/* OBJEKT */

.coin{position:absolute;font-size:26px}
.tree{position:absolute;font-size:40px}
.flower{position:absolute;font-size:24px}
.hedgehog{position:absolute;font-size:28px}

.flag{
position:absolute;
bottom:80px;
font-size:70px;
}

/* UI */

#progress{
position:absolute;
top:10px;
left:10px;
background:white;
padding:6px 10px;
border-radius:6px;
}

#controls{
display:flex;
justify-content:center;
gap:30px;
padding:15px;
background:#1c2e4a;
}

button{
font-size:28px;
padding:14px 20px;
border:none;
border-radius:10px;
background:#2f4b7c;
color:white;
}

/* MATTE */

#math{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
}

.grid{
display:grid;
grid-template-columns:60px 60px 60px;
grid-template-rows:60px 60px 60px 60px;
background:white;
padding:10px;
}

.cell{
border:2px solid black;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
}

input{
width:100%;
height:100%;
border:none;
font-size:28px;
text-align:center;
}

/* FIRANDE */

.fire{position:absolute;font-size:30px}

</style>
</head>

<body>

<div id="game">

<div id="progress">0 / 5</div>

<div id="world">
<div class="ground"></div>
</div>

<div id="player">
<div id="playerSprite"></div>
</div>

<div id="dog">
<img id="dogImg" src="dog-sit.png">
</div>

</div>

<div id="controls">
<button id="jump">⬆️</button>
<button id="right">➡️</button>
</div>

<div id="math">
<div>
<div class="grid" id="grid"></div>
<button onclick="check()">Klar</button>
</div>
</div>

<audio id="music" src="Music.mp3" loop></audio>
<audio id="jumpSound" src="Jump.mp3"></audio>
<audio id="correctSound" src="Correct.mp3"></audio>

<script>

/* SPELVARIABLER */

let worldX=0
let vy=0
let onGround=true
let moving=false
let paused=false
let finished=false
let flagReached=false

let tasks=["39+15","63+28","58+34","37+45","44+17"]

let taskIndex=0
let correct=0
let nextSpawn=600

const world=document.getElementById("world")
const player=document.getElementById("player")
const sprite=document.getElementById("playerSprite")
const dog=document.getElementById("dog")
const dogImg=document.getElementById("dogImg")

const music=document.getElementById("music")
const jumpSound=document.getElementById("jumpSound")
const correctSound=document.getElementById("correctSound")

generateWorld()

/* GENERERA BANA */

function generateWorld(){

for(let i=0;i<40;i++){

spawnObstacle()
spawnCoin()
spawnHill()
spawnPit()
spawnDecoration()

}

}

function spawnObstacle(){

let o=document.createElement("div")
o.className="hedgehog"
o.innerText="🦔"
o.style.left=nextSpawn+"px"
o.style.bottom="80px"

world.appendChild(o)

nextSpawn+=500

}

function spawnCoin(){

let c=document.createElement("div")
c.className="coin"
c.innerText="🪙"
c.style.left=(nextSpawn-250)+"px"
c.style.bottom="140px"

world.appendChild(c)

}

function spawnHill(){

if(Math.random()<0.5){

let h=document.createElement("div")
h.className="hill"
h.style.left=(nextSpawn-200)+"px"

world.appendChild(h)

}

}

function spawnPit(){

if(Math.random()<0.35){

let p=document.createElement("div")
p.className="pit"
p.style.left=(nextSpawn-350)+"px"

world.appendChild(p)

}

}

function spawnDecoration(){

let r=Math.random()

if(r<0.3){

let t=document.createElement("div")
t.className="tree"
t.innerText="🌳"
t.style.left=(nextSpawn-100)+"px"
t.style.bottom="80px"
world.appendChild(t)

}else{

let f=document.createElement("div")
f.className="flower"
f.innerText="🌼"
f.style.left=(nextSpawn-150)+"px"
f.style.bottom="80px"
world.appendChild(f)

}

}

/* KONTROLLER */

right.onpointerdown=()=>{
moving=true
sprite.classList.add("walk")
dogImg.src="dog-walk.png"
music.play().catch(()=>{})
}

right.onpointerup=()=>{
moving=false
sprite.classList.remove("walk")
dogImg.src="dog-sit.png"
}

jump.onpointerdown=()=>{
if(onGround){
vy=14
onGround=false
jumpSound.play()
}
}

/* MATTE */

function showMath(){

paused=true

let q=tasks[taskIndex]
let [a,b]=q.split("+").map(Number)

correct=a+b

buildGrid(a,b)

math.style.display="flex"

}

function buildGrid(a,b){

const grid=document.getElementById("grid")
grid.innerHTML=""

const aT=Math.floor(a/10)
const aO=a%10
const bT=Math.floor(b/10)
const bO=b%10

const cells=[
"", "", "",
"", aT, aO,
"+", bT, bO,
"", "", ""
]

cells.forEach((v,i)=>{

let c=document.createElement("div")
c.className="cell"

if(v===""){

let inp=document.createElement("input")
inp.maxLength=1

if(i>=9) inp.classList.add("answer")

c.appendChild(inp)

}else{

c.textContent=v

}

grid.appendChild(c)

})

}

function check(){

let nums=[...document.querySelectorAll(".answer")].map(i=>i.value).join("")
let val=parseInt(nums)

if(val===correct){

correctSound.play()
dogJump()

taskIndex++
progress.innerText=taskIndex+" / "+tasks.length

math.style.display="none"
paused=false

if(taskIndex>=tasks.length){

finished=true
spawnFlag()

}

}

}

function dogJump(){

dog.style.transform="translateY(-40px)"

setTimeout(()=>{
dog.style.transform="translateY(0)"
},200)

}

/* FLAGGA */

function spawnFlag(){

let flag=document.createElement("div")
flag.className="flag"

let playerPos=-worldX+window.innerWidth*0.6
flag.style.left=(playerPos+300)+"px"

flag.innerText="🏁"

world.appendChild(flag)

}

/* FYRVERKERI */

function fireworks(){

for(let i=0;i<25;i++){

let star=document.createElement("div")
star.className="fire"
star.innerText="✨"

star.style.left=(window.innerWidth/2+Math.random()*200-100)+"px"
star.style.top=(window.innerHeight/2+Math.random()*200-100)+"px"

document.body.appendChild(star)

setTimeout(()=>star.remove(),800)

}

}

/* SPELLOOP */

function loop(){

if(!paused){

if(moving) worldX-=4

vy-=0.6
let bottom=parseFloat(player.style.bottom||80)
bottom+=vy

if(bottom<=80){
bottom=80
vy=0
onGround=true
}

player.style.bottom=bottom+"px"
world.style.left=worldX+"px"

dog.style.left=(player.offsetLeft-90)+"px"

const pr=player.getBoundingClientRect()

document.querySelectorAll(".hedgehog").forEach(o=>{

const r=o.getBoundingClientRect()

if(pr.right>r.left && pr.left<r.right){

showMath()
o.remove()

}

})

document.querySelectorAll(".flag").forEach(f=>{

const r=f.getBoundingClientRect()

if(pr.right>r.left && pr.left<r.right && !flagReached){

flagReached=true
fireworks()

}

})

}

requestAnimationFrame(loop)

}

loop()

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mattekompis 23.2</title>

<style>

*{
margin:0;
box-sizing:border-box;
user-select:none;
-webkit-user-select:none;
-webkit-tap-highlight-color:transparent;
}

body{
overflow:hidden;
background:linear-gradient(#7ecbff,#c8f6ff);
}

/* SPEL */

#game{
position:relative;
height:65vh;
overflow:hidden;
}

#world{
position:absolute;
bottom:0;
left:0;
height:100%;
width:200000px;
}

/* SPELARE */

#player{
position:absolute;
left:40%;
bottom:80px;
width:82px;
height:82px;
z-index:5;
}

#playerSprite{
width:100%;
height:100%;
background:url("player-idle.PNG") center/contain no-repeat;
}

.walk{
background:url("player-walk.PNG");
background-size:auto 82px;
animation:walk .6s steps(6) infinite;
}

@keyframes walk{
from{background-position:0}
to{background-position:-492px}
}

/* HUND */

#dog{
position:absolute;
bottom:80px;
width:30px;
height:30px;
z-index:4;
}

#dog img{
width:100%;
height:100%;
object-fit:contain;
}

/* MARK */

.segment{position:absolute}

.ground{background:#2ecc71;}

.hill{
background:linear-gradient(#2ecc71,#27ae60);
}

.water{
background:linear-gradient(90deg,#3498db,#5dade2,#3498db);
}

/* BÅT */

.boat{
position:absolute;
bottom:80px;
font-size:40px;
transform:scale(2);
}

/* TRÄD */

.tree,.palm{
position:absolute;
font-size:60px;
z-index:2;
}

/* DINOSAURIER */

.dino{
position:absolute;
font-size:50px;
z-index:1;
}

/* KONTROLLER */

#controls{
display:flex;
justify-content:center;
gap:20px;
background:#1c2e4a;
padding:10px;
}

button{
font-size:28px;
padding:12px 18px;
border:none;
border-radius:10px;
background:#2f4b7c;
color:white;
touch-action:manipulation;
}

</style>
</head>

<body>

<div id="game">
<div id="world"></div>

<div id="player"><div id="playerSprite"></div></div>
<div id="dog"><img id="dogImg" src="dog-sit.png"></div>
</div>

<div id="controls">
<button id="left">⬅️</button>
<button id="jump">⬆️</button>
<button id="right">➡️</button>
</div>

<script>

/* VARIABLER */

let worldX=0, vy=0, onGround=true, moveDir=0
let onBoat=null

const world=document.getElementById("world")
const player=document.getElementById("player")
const dog=document.getElementById("dog")
const dogImg=document.getElementById("dogImg")

let segments=[], boats=[]

/* GENERERA */

let x=0

for(let i=0;i<80;i++){

let r=Math.random()

if(r<0.5) createGround(220)
else if(r<0.75) createHill(220)
else createWater(300)

spawnDecor(x)

x+=260

}

/* MARK */

function createGround(w){

segments.push({type:"ground",x:x,width:w})

let d=document.createElement("div")
d.className="segment ground"
d.style.left=x+"px"
d.style.width=w+"px"
d.style.height="80px"
d.style.bottom="0"
world.appendChild(d)

}

function createHill(w){

segments.push({type:"hill",x:x,width:w})

// mark under
let base=document.createElement("div")
base.className="segment ground"
base.style.left=x+"px"
base.style.width=w+"px"
base.style.height="80px"
base.style.bottom="0"
world.appendChild(base)

let d=document.createElement("div")
d.className="segment hill"
d.style.left=x+"px"
d.style.width=w+"px"
d.style.height="80px"
d.style.bottom="80px"
d.style.borderRadius="50% 50% 0 0"
world.appendChild(d)

}

function createWater(w){

segments.push({type:"water",x:x,width:w})

let d=document.createElement("div")
d.className="segment water"
d.style.left=x+"px"
d.style.width=w+"px"
d.style.height="80px"
d.style.bottom="0"
world.appendChild(d)

/* båt */

let bx=x+w/2-80

let b=document.createElement("div")
b.className="boat"
b.innerText="⛵"
b.style.left=bx+"px"

world.appendChild(b)

boats.push({x:bx,width:160,speed:1.2})

}

/* DEKOR */

function spawnDecor(px){

let hasTree=false

if(Math.random()<0.25){

hasTree=true

let count=2+Math.floor(Math.random()*2)

for(let i=0;i<count;i++){

let el=document.createElement("div")

if(Math.random()<0.8){
el.className="palm"
el.innerText="🌴"
}else{
el.className="tree"
el.innerText="🌳"
}

el.style.left=(px+i*40)+"px"
el.style.bottom="80px"

world.appendChild(el)

}
}

// dinos only on flat ground without trees
if(!hasTree && Math.random()<0.3){

let d=document.createElement("div")
d.className="dino"
d.innerText=Math.random()<0.5?"🦖":"🦕"
d.style.left=(px+60)+"px"
d.style.bottom="80px"

world.appendChild(d)

}

}

/* KONTROLLER */

function stopMove(){
moveDir=0
dogImg.src="dog-sit.png"
}

right.onpointerdown=()=>{
moveDir=1
dogImg.src="dog-walk.png"
}

left.onpointerdown=()=>{
moveDir=-1
dogImg.src="dog-walk.png"
}

right.onpointerup=stopMove
left.onpointerup=stopMove

window.addEventListener("pointerup",stopMove)
window.addEventListener("pointercancel",stopMove)
window.addEventListener("touchend",stopMove)
window.addEventListener("blur",stopMove)

jump.onpointerdown=()=>{
if(onGround){
vy=12
onGround=false
}
}

/* KULLAR */

function hillHeight(px,s){
let c=s.x+s.width/2
let sigma=s.width/4
let d=px-c
return 80+60*Math.exp(-(d*d)/(2*sigma*sigma))
}

/* MARK */

function getGround(px){

let ground=null
onBoat=null

// boat first
for(let b of boats){
if(px>=b.x && px<=b.x+b.width){
onBoat=b
return 80
}
}

// terrain
for(let s of segments){

if(px>=s.x && px<=s.x+s.width){

if(s.type==="ground") return 80
if(s.type==="hill") return hillHeight(px,s)
if(s.type==="water") return null

}

}

return 80
}

/* LOOP */

function loop(){

if(moveDir!==0){
worldX-=moveDir*4
}

// move boats
boats.forEach(b=>b.x+=b.speed)

vy-=0.6

let px=-worldX + window.innerWidth*0.4
let ground=getGround(px)

let bottom=parseFloat(player.style.bottom||80)
let prevBottom=bottom

bottom+=vy

// BOAT LANDING
if(onBoat){

let boatTop=80

if(prevBottom>=boatTop && bottom<=boatTop){

bottom=boatTop
vy=0
onGround=true

// follow boat
worldX-=onBoat.speed

}else{
onGround=false
}

}

// GROUND
else if(ground!==null){

if(bottom<=ground && vy<=0){

bottom=ground
vy=0
onGround=true

}else{
onGround=false
}

}

// FALL
else{
onGround=false
}

player.style.bottom=bottom+"px"
world.style.left=worldX+"px"

// DOG FOLLOW
dog.style.left=(player.offsetLeft-35)+"px"
dog.style.bottom=player.style.bottom

if(!onGround){
dog.style.transform="translateY(-10px)"
}else{
dog.style.transform="translateY(0)"
}

requestAnimationFrame(loop)

}

loop()

</script>
</body>
</html>

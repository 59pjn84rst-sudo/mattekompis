<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mattekompis – Grafikläge 22.2</title>

<style>

*{
margin:0;
box-sizing:border-box;
user-select:none;
-webkit-user-select:none;
-webkit-tap-highlight-color:transparent;
}

body{
overflow:hidden;
background:linear-gradient(#7ecbff,#c8f6ff);
}

/* SPEL */

#game{
position:relative;
height:65vh;
overflow:hidden;
}

#world{
position:absolute;
bottom:0;
left:0;
height:100%;
width:200000px;
}

/* SPELARE */

#player{
position:absolute;
left:40%;
bottom:80px;
width:110px;
height:110px;
}

#playerSprite{
width:100%;
height:100%;
background:url("player-idle.PNG") center/contain no-repeat;
}

.walk{
background:url("player-walk.PNG");
background-size:auto 110px;
animation:walk .6s steps(6) infinite;
}

@keyframes walk{
from{background-position:0}
to{background-position:-660px}
}

/* HUND */

#dog{
position:absolute;
bottom:80px;
width:80px;
}
#dog img{width:100%}

/* ELEMENT */

.segment{position:absolute}
.hill{background:#27ae60}
.ground{background:#2ecc71}
.water{background:#3498db}

.boat{
position:absolute;
bottom:80px;
font-size:40px;
}

/* DEKOR */

.tree{position:absolute;font-size:40px}
.animal{position:absolute;font-size:30px}

/* KONTROLLER */

#controls{
display:flex;
justify-content:center;
gap:20px;
background:#1c2e4a;
padding:10px;
}

button{
font-size:28px;
padding:12px 18px;
border:none;
border-radius:10px;
background:#2f4b7c;
color:white;
touch-action:manipulation;
}

</style>
</head>

<body>

<div id="game">
<div id="world"></div>

<div id="player">
<div id="playerSprite"></div>
</div>

<div id="dog">
<img id="dogImg" src="dog-sit.png">
</div>

</div>

<div id="controls">
<button id="left">⬅️</button>
<button id="jump">⬆️</button>
<button id="right">➡️</button>
</div>

<audio id="music" src="Music.mp3" loop></audio>
<audio id="jumpSound" src="Jump.mp3"></audio>

<script>

/* VARIABLER */

let worldX=0
let vy=0
let onGround=true
let movingLeft=false
let movingRight=false

const world=document.getElementById("world")
const player=document.getElementById("player")
const sprite=document.getElementById("playerSprite")
const dog=document.getElementById("dog")
const dogImg=document.getElementById("dogImg")

const music=document.getElementById("music")
const jumpSound=document.getElementById("jumpSound")

const animals=["🐒","🦉","🐝","🦄","🐜","🐙","🐳","🦀","🦑","🦕","🦖","🐍","🐅","🐆","🦓","🦍","🦧","🦒","🦘","🦌","🐈","🐩","🐓","🦩"]

let segments=[]
let boats=[]

/* GENERERA TERRÄNG */

let x=0

for(let i=0;i<80;i++){

let typeRand=Math.random()

if(typeRand<0.5){
createGround(200)
}
else if(typeRand<0.75){
createHill(220)
}
else{
createWater(200+Math.random()*200)
}

spawnDecor(x)

x+=250

}

function createGround(w){

segments.push({type:"ground",x:x,width:w})

let d=document.createElement("div")
d.className="segment ground"
d.style.left=x+"px"
d.style.width=w+"px"
d.style.height="80px"
d.style.bottom="0px"

world.appendChild(d)

}

function createHill(w){

segments.push({type:"hill",x:x,width:w})

let d=document.createElement("div")
d.className="segment hill"
d.style.left=x+"px"
d.style.width=w+"px"
d.style.height="120px"
d.style.bottom="80px"
d.style.borderRadius="200px 200px 0 0"

world.appendChild(d)

}

function createWater(w){

segments.push({type:"water",x:x,width:w})

let d=document.createElement("div")
d.className="segment water"
d.style.left=x+"px"
d.style.width=w+"px"
d.style.height="80px"
d.style.bottom="0px"

world.appendChild(d)

/* båt */

let b=document.createElement("div")
b.className="boat"
b.innerText="⛵"
b.style.left=(x+w/2-20)+"px"

world.appendChild(b)

boats.push({x:x+w/2-20,width:40})

}

function spawnDecor(px){

if(Math.random()<0.6){

let t=document.createElement("div")
t.className="tree"
t.innerText="🌳"
t.style.left=px+"px"
t.style.bottom="80px"
world.appendChild(t)

}

if(Math.random()<0.5){

let a=document.createElement("div")
a.className="animal"
a.innerText=animals[Math.floor(Math.random()*animals.length)]
a.style.left=(px+40)+"px"
a.style.bottom="80px"
world.appendChild(a)

}

}

/* KONTROLLER */

right.onpointerdown=()=>{
movingRight=true
sprite.classList.add("walk")
dogImg.src="dog-walk.png"
music.play().catch(()=>{})
}
right.onpointerup=()=>{
movingRight=false
sprite.classList.remove("walk")
dogImg.src="dog-sit.png"
}

left.onpointerdown=()=>{
movingLeft=true
}
left.onpointerup=()=>{
movingLeft=false
}

jump.onpointerdown=()=>{
if(onGround){
vy=14
onGround=false
jumpSound.play()
}
}

/* MARKHÖJD */

function getGround(px){

let ground=80

segments.forEach(s=>{

if(px>=s.x && px<=s.x+s.width){

if(s.type==="ground"){
ground=80
}

if(s.type==="hill"){
let t=(px-s.x)/s.width
let height=Math.sin(t*Math.PI)*120
ground=80+height
}

if(s.type==="water"){
ground=-200
}

}

})

boats.forEach(b=>{
if(px>=b.x && px<=b.x+b.width){
ground=80
}
})

return ground

}

/* LOOP */

function loop(){

if(movingRight) worldX-=4
if(movingLeft) worldX+=4

vy-=0.6

let px=-worldX + window.innerWidth*0.4
let ground=getGround(px)

let bottom=parseFloat(player.style.bottom||80)
bottom+=vy

if(bottom<=ground){
bottom=ground
vy=0
onGround=true
}else{
onGround=false
}

player.style.bottom=bottom+"px"
world.style.left=worldX+"px"

dog.style.left=(player.offsetLeft-90)+"px"

requestAnimationFrame(loop)

}

loop()

</script>
</body>
</html>

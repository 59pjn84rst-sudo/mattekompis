<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Mattekompis</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

*{
user-select:none;
-webkit-user-select:none;
-webkit-touch-callout:none;
}

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:#7ecbff;
}

#start{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:#7ecbff;
gap:20px;
}

#game{
position:relative;
height:60vh;
background:linear-gradient(#7ecbff,#c8f6ff);
overflow:hidden;
}

canvas{
position:absolute;
bottom:0;
left:0;
}

#controls{
display:flex;
justify-content:center;
gap:30px;
padding:20px;
background:#1c2e4a;
}

button{
font-size:30px;
padding:15px 20px;
border-radius:12px;
border:none;
background:#2f4b7c;
color:white;
}

#math{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
}

#mathBox{
background:white;
padding:20px;
border-radius:10px;
}

.grid{
display:grid;
grid-template-columns:60px 60px 60px;
grid-template-rows:60px 60px 60px 60px;
}

.cell{
border:2px solid black;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
}

input{
width:100%;
height:100%;
font-size:30px;
text-align:center;
border:none;
}

</style>
</head>

<body>

<div id="start">

<h1>Mattekompis</h1>

<button onclick="startGame()">Starta</button>

<input type="file" id="photo">

</div>

<div id="game">

<canvas id="world"></canvas>

</div>

<div id="controls">

<button id="left">⬅️</button>
<button id="jump">⬆️</button>
<button id="right">➡️</button>

</div>

<div id="math">

<div id="mathBox">

<div id="grid" class="grid"></div>

<button onclick="check()">Klar</button>

</div>

</div>

<script>

const canvas=document.getElementById("world")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight*0.6

let player={
x:200,
y:0,
vy:0,
width:60,
height:80
}

let gravity=0.8
let speed=5
let jumpPower=14

let ground=300

let hills=[]
let obstacles=[]

let moving=false

function startGame(){

document.getElementById("start").style.display="none"

generateWorld()

loop()

}

function generateWorld(){

for(let i=0;i<20;i++){

hills.push({
x:i*400+300,
width:200,
height:100
})

obstacles.push({
x:i*400+500,
y:ground-60
})

}

}

function physics(){

player.vy+=gravity
player.y+=player.vy

if(player.y>ground-player.height){

player.y=ground-player.height
player.vy=0

}

}

function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

physics()

ctx.fillStyle="#27ae60"

ctx.fillRect(0,ground,canvas.width,100)

hills.forEach(h=>{

ctx.beginPath()
ctx.arc(h.x,ground,100,Math.PI,0)
ctx.fill()

})

ctx.fillStyle="purple"

obstacles.forEach(o=>{

ctx.fillRect(o.x,ground-60,60,60)

})

ctx.fillStyle="orange"

ctx.fillRect(player.x,player.y,player.width,player.height)

requestAnimationFrame(loop)

}

jump.onclick=()=>{
player.vy=-jumpPower
}

right.onpointerdown=()=>moving=true
right.onpointerup=()=>moving=false

setInterval(()=>{

if(moving){

player.x+=speed

}

},16)

function showMath(){

document.getElementById("math").style.display="flex"

buildGrid(34,27)

}

function buildGrid(a,b){

const grid=document.getElementById("grid")

grid.innerHTML=""

const a1=Math.floor(a/10)
const a2=a%10

const b1=Math.floor(b/10)
const b2=b%10

const cells=[
"",
a1,
a2,
"+",
b1,
b2,
"",
"",
"",
"",
"i",
"i"
]

cells.forEach(v=>{

const c=document.createElement("div")
c.className="cell"

if(v==="i"){

const input=document.createElement("input")
input.maxLength=1
c.appendChild(input)

}else{

c.textContent=v

}

grid.appendChild(c)

})

}

function check(){

document.getElementById("math").style.display="none"

}

document.getElementById("photo").addEventListener("change",async e=>{

const file=e.target.files[0]

const res=await Tesseract.recognize(file,"eng")

console.log(res.data.text)

})

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mattekompis 22.4</title>

<style>

*{
margin:0;
box-sizing:border-box;
user-select:none;
-webkit-user-select:none;
-webkit-tap-highlight-color:transparent;
}

body{
overflow:hidden;
background:linear-gradient(#7ecbff,#c8f6ff);
}

/* SPEL */

#game{
position:relative;
height:65vh;
overflow:hidden;
}

#world{
position:absolute;
bottom:0;
left:0;
height:100%;
width:200000px;
}

/* SPELARE */

#player{
position:absolute;
left:40%;
bottom:80px;
width:82px; /* 75% */
height:82px;
}

#playerSprite{
width:100%;
height:100%;
background:url("player-idle.PNG") center/contain no-repeat;
}

.walk{
background:url("player-walk.PNG");
background-size:auto 82px;
animation:walk .6s steps(6) infinite;
}

@keyframes walk{
from{background-position:0}
to{background-position:-492px}
}

/* HUND */

#dog{
position:absolute;
bottom:80px;
width:40px; /* 50% */
}
#dog img{width:100%}

/* SEGMENT */

.segment{position:absolute}
.ground{background:#2ecc71}

.hill{
background:linear-gradient(#2ecc71,#27ae60);
}

/* VATTEN */

.water{
background:#3498db;
}

/* BÅT */

.boat{
position:absolute;
bottom:80px;
font-size:40px;
transform:scale(2);
}

/* TRÄD */

.tree{
position:absolute;
font-size:60px; /* 150% */
z-index:2;
}

/* PALM */

.palm{
position:absolute;
font-size:60px;
z-index:2;
}

/* DJUR */

.animal{
position:absolute;
font-size:40px;
z-index:1; /* bakom träd */
}

/* KONTROLLER */

#controls{
display:flex;
justify-content:center;
gap:20px;
background:#1c2e4a;
padding:10px;
}

button{
font-size:28px;
padding:12px 18px;
border:none;
border-radius:10px;
background:#2f4b7c;
color:white;
touch-action:manipulation;
}

</style>
</head>

<body>

<div id="game">
<div id="world"></div>

<div id="player">
<div id="playerSprite"></div>
</div>

<div id="dog">
<img id="dogImg" src="dog-sit.png">
</div>

</div>

<div id="controls">
<button id="left">⬅️</button>
<button id="jump">⬆️</button>
<button id="right">➡️</button>
</div>

<script>

/* VARIABLER */

let worldX=0
let vy=0
let onGround=true
let moveDir=0

const world=document.getElementById("world")
const player=document.getElementById("player")
const sprite=document.getElementById("playerSprite")
const dog=document.getElementById("dog")

let segments=[]
let boats=[]

const animals=["🐒","🦉","🐝","🦄","🐜","🐙","🐳","🦀","🦑","🦕","🦖","🐍","🐅","🐆","🦓","🦍","🦧","🦒","🦘","🦌","🐈","🐩","🐓","🦩"]

/* GENERERA */

let x=0

for(let i=0;i<80;i++){

let r=Math.random()

if(r<0.5) createGround(220)
else if(r<0.75) createHill(220)
else createWater(250)

spawnDecorCluster(x)

x+=260

}

/* MARK */

function createGround(w){

segments.push({type:"ground",x:x,width:w})

let d=document.createElement("div")
d.className="segment ground"
d.style.left=x+"px"
d.style.width=w+"px"
d.style.height="80px"
d.style.bottom="0px"

world.appendChild(d)

}

/* KULLAR (lägre!) */

function createHill(w){

segments.push({type:"hill",x:x,width:w})

let d=document.createElement("div")
d.className="segment hill"
d.style.left=x+"px"
d.style.width=w+"px"
d.style.height="60px" /* lägre */
d.style.bottom="80px"
d.style.borderRadius="200px 200px 0 0"

world.appendChild(d)

}

/* VATTEN */

function createWater(w){

segments.push({type:"water",x:x,width:w})

let d=document.createElement("div")
d.className="segment water"
d.style.left=x+"px"
d.style.width=w+"px"
d.style.height="80px"
d.style.bottom="0px"

world.appendChild(d)

/* båt */

let bx=x+w/2-40

let b=document.createElement("div")
b.className="boat"
b.innerText="⛵"
b.style.left=bx+"px"

world.appendChild(b)

boats.push({x:bx,width:80})

}

/* TRÄD-KLUSTER */

function spawnDecorCluster(px){

let count=2+Math.floor(Math.random()*4)

for(let i=0;i<count;i++){

let type=Math.random()

let el=document.createElement("div")

if(type<0.7){
el.className="tree"
el.innerText="🌳"
}else{
el.className="palm"
el.innerText="🌴"
}

el.style.left=(px+i*20)+"px"
el.style.bottom="80px"

world.appendChild(el)

}

/* djur bakom */

if(Math.random()<0.6){

let a=document.createElement("div")
a.className="animal"
a.innerText=animals[Math.floor(Math.random()*animals.length)]
a.style.left=(px+40)+"px"
a.style.bottom="80px"

world.appendChild(a)

}

}

/* KONTROLLER */

right.onpointerdown=()=>{moveDir=1;sprite.classList.add("walk")}
right.onpointerup=()=>{moveDir=0;sprite.classList.remove("walk")}

left.onpointerdown=()=>{moveDir=-1;sprite.classList.add("walk")}
left.onpointerup=()=>{moveDir=0;sprite.classList.remove("walk")}

jump.onpointerdown=()=>{
if(onGround){
vy=12
onGround=false
}
}

/* MARKHÖJD */

function getGround(px){

let ground=80

for(let s of segments){

if(px>=s.x && px<=s.x+s.width){

if(s.type==="ground") ground=80

if(s.type==="hill"){

let t=(px-s.x)/s.width
let height=Math.sin(t*Math.PI)*60 /* lägre */
ground=80+height

}

if(s.type==="water") ground=-200

}

}

/* båt override */

for(let b of boats){

if(px>=b.x && px<=b.x+b.width){
ground=80
}

}

return ground

}

/* LOOP */

function loop(){

// FIX: ingen drift
if(moveDir!==0){
worldX-=moveDir*4
}

vy-=0.6

let px=-worldX + window.innerWidth*0.4
let ground=getGround(px)

let bottom=parseFloat(player.style.bottom||80)
bottom+=vy

if(bottom<=ground){
bottom=ground
vy=0
onGround=true
}else{
onGround=false
}

player.style.bottom=bottom+"px"
world.style.left=worldX+"px"

dog.style.left=(player.offsetLeft-60)+"px"

requestAnimationFrame(loop)

}

loop()

</script>
</body>
</html>

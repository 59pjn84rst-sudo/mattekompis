<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mattekompis</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:#7ecbff;
}

button{-webkit-tap-highlight-color:transparent}

#startScreen{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:#7ecbff;
gap:15px;
}

#game{
position:relative;
height:60vh;
background:linear-gradient(#7ecbff,#c8f6ff);
overflow:hidden;
}

#world{
position:absolute;
bottom:0;
left:0;
height:100%;
width:200000px;
}

.ground{
position:absolute;
bottom:0;
height:80px;
width:200000px;
background:#2ecc71;
}

.tree{position:absolute;bottom:80px;font-size:50px}
.flower{position:absolute;bottom:80px;font-size:24px}

.hill{
position:absolute;
bottom:80px;
width:240px;
height:120px;
background:#27ae60;
border-radius:240px 240px 0 0;
}

.obstacle{
position:absolute;
bottom:80px;
width:60px;
height:60px;
background:#8e44ad;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
}

#player{
position:absolute;
bottom:80px;
left:40%;
width:140px;
height:140px;
display:flex;
align-items:flex-end;
justify-content:center;
}

#player img{
width:100%;
height:100%;
object-fit:contain;
}

.walking{
background-image:url("player-walk.PNG");
background-repeat:no-repeat;
animation:walk .6s steps(6) infinite;
}

@keyframes walk{
from{background-position:0}
to{background-position:-1536px}
}

#dog{
position:absolute;
bottom:80px;
left:30%;
width:90px;
}

#dog img{width:100%}

#controls{
display:flex;
justify-content:center;
gap:30px;
padding:15px;
background:#1c2e4a;
}

button{
font-size:30px;
padding:15px 20px;
border-radius:12px;
border:none;
background:#2f4b7c;
color:white;
}

#math{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
}

#mathBox{
background:white;
padding:30px;
border-radius:12px;
text-align:center;
}

input{font-size:30px;width:120px;text-align:center}

#progress{
position:absolute;
top:10px;
left:10px;
background:white;
padding:6px 10px;
border-radius:6px;
}

</style>
</head>

<body>

<div id="startScreen">

<img src="icon.PNG" width="160">
<h1>Mattekompis</h1>

<button onclick="startGame()">Starta</button>

<input type="file" id="photoInput" accept="image/*">

</div>

<div id="game">

<div id="progress">0 / 5</div>

<div id="world">
<div class="ground"></div>
</div>

<div id="player">
<img id="playerIdle" src="player-idle.PNG">
</div>

<div id="dog">
<img id="dogImg" src="dog-sit.png">
</div>

</div>

<div id="controls">
<button id="left">⬅️</button>
<button id="jump">⬆️</button>
<button id="right">➡️</button>
</div>

<div id="math">
<div id="mathBox">
<h2 id="question"></h2>
<input id="answer">
<br><br>
<button onclick="check()">Klar</button>
</div>
</div>

<audio id="music" src="Music.mp3" loop></audio>
<audio id="jumpSound" src="Jump.mp3"></audio>
<audio id="correctSound" src="Correct.mp3"></audio>

<script>

let worldX=0
let right=false
let left=false
let vy=0
let onGround=true
let paused=false

let tasks=["39+15","63+28","58+34","37+45","44+17"]
let wrongTasks=[]

let taskIndex=0
let correct=0

let nextSpawn=800

const world=document.getElementById("world")
const player=document.getElementById("player")
const playerIdle=document.getElementById("playerIdle")
const dogImg=document.getElementById("dogImg")

function startGame(){

document.getElementById("startScreen").style.display="none"

const music=document.getElementById("music")
music.volume=.3
music.play()

generateWorld()

}

function generateWorld(){
for(let i=0;i<25;i++){
spawnDecoration()
spawnObstacle()
}
}

function spawnDecoration(){

let x=nextSpawn+Math.random()*400
let type=Math.random()

if(type<0.33){

let tree=document.createElement("div")
tree.className="tree"
tree.style.left=x+"px"
tree.innerText="🌳"
world.appendChild(tree)

}else if(type<0.66){

let flower=document.createElement("div")
flower.className="flower"
flower.style.left=x+"px"
flower.innerText="🌼"
world.appendChild(flower)

}else{

let hill=document.createElement("div")
hill.className="hill"
hill.style.left=x+"px"
world.appendChild(hill)

}

}

function spawnObstacle(){

let obstacle=document.createElement("div")
obstacle.className="obstacle"
obstacle.style.left=nextSpawn+"px"
obstacle.innerText="?"
world.appendChild(obstacle)

nextSpawn+=600

}

document.getElementById("right").onpointerdown=()=>{
right=true
player.classList.add("walking")
playerIdle.style.display="none"
dogImg.src="dog-walk.png"
}

document.getElementById("right").onpointerup=()=>{
right=false
player.classList.remove("walking")
playerIdle.style.display="block"
dogImg.src="dog-sit.png"
}

document.getElementById("left").onpointerdown=()=>left=true
document.getElementById("left").onpointerup=()=>left=false

document.getElementById("jump").onpointerdown=()=>{
if(onGround){
vy=12
onGround=false
document.getElementById("jumpSound").play()
}
}

function fireworks(){

for(let i=0;i<20;i++){

let star=document.createElement("div")
star.innerText="✨"
star.style.position="absolute"
star.style.left=(window.innerWidth/2+Math.random()*200-100)+"px"
star.style.top=(window.innerHeight/2+Math.random()*200-100)+"px"
star.style.fontSize="24px"

document.body.appendChild(star)

setTimeout(()=>star.remove(),800)

}

}

function dogCelebrate(){

const dog=document.getElementById("dog")

dog.style.transition="transform .2s"

let jump=0

let interval=setInterval(()=>{

dog.style.transform="translateY(-20px)"

setTimeout(()=>{
dog.style.transform="translateY(0px)"
},100)

jump++

if(jump==2){

clearInterval(interval)

let text=document.createElement("div")
text.innerText="Voff!"
text.style.position="absolute"
text.style.bottom="160px"
text.style.left=dog.offsetLeft+"px"

document.body.appendChild(text)

setTimeout(()=>text.remove(),1000)

}

},250)

}

function showMath(){

paused=true

let q

if(wrongTasks.length>0 && Math.random()<.4){
q=wrongTasks.shift()
}else{
q=tasks[taskIndex]
}

const parts=q.split("+")
correct=parseInt(parts[0])+parseInt(parts[1])

document.getElementById("question").innerText=q

document.getElementById("math").style.display="flex"

}

function check(){

const v=parseInt(document.getElementById("answer").value)

if(v===correct){

document.getElementById("correctSound").play()
fireworks()
dogCelebrate()

document.getElementById("math").style.display="none"

taskIndex++

document.getElementById("progress").innerText=taskIndex+" / "+tasks.length

paused=false

if(taskIndex===tasks.length){
spawnFlag()
}

}else{

wrongTasks.push(document.getElementById("question").innerText)

}

}

function spawnFlag(){

const flag=document.createElement("div")
flag.style.position="absolute"
flag.style.left=(nextSpawn+400)+"px"
flag.style.bottom="80px"
flag.style.fontSize="70px"
flag.innerText="🏁"

world.appendChild(flag)

}

function loop(){

if(!paused){

let next=worldX

if(right) next-=4
if(left) next+=4

vy-=0.6

let bottom=parseFloat(player.style.bottom||80)

bottom+=vy

if(bottom<=80){
bottom=80
vy=0
onGround=true
}

player.style.bottom=bottom+"px"

const dog=document.getElementById("dog")
dog.style.left=(player.offsetLeft-120)+"px"

world.style.left=next+"px"
worldX=next

if(-worldX+window.innerWidth>nextSpawn-1000){
spawnDecoration()
spawnObstacle()
}

const pr=player.getBoundingClientRect()

document.querySelectorAll(".obstacle").forEach(o=>{

const r=o.getBoundingClientRect()

if(pr.right>r.left && pr.left<r.right){

showMath()

o.remove()

}

})

}

requestAnimationFrame(loop)

}

loop()

document.getElementById("photoInput").addEventListener("change",async e=>{

const file=e.target.files[0]

const result=await Tesseract.recognize(file,"eng")

const text=result.data.text

let found=text.match(/\d+\s*\+\s*\d+/g)

if(found){
tasks=found
}

})

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mattekompis v31</title>

<style>
body{
margin:0;
overflow:hidden;
background:linear-gradient(#7ecbff,#c8f6ff);
}

#game{
position:relative;
height:65vh;
overflow:hidden;
}

/* MARK */
#ground{
position:absolute;
bottom:0;
height:80px;
width:100%;
background:#2ecc71;
}

/* SPELARE */
#player{
position:absolute;
left:40%;
bottom:80px;
width:160px;
height:160px;
}

#playerSprite{
width:100%;
height:100%;
background:url("player-idle.PNG") center/contain no-repeat;
}

.walk{
background:url("player-walk.PNG") left center;
background-size:auto 160px;
animation:walk .6s steps(6) infinite;
}

@keyframes walk{
from{background-position:0}
to{background-position:-960px}
}

/* HUND */
#dog{
position:absolute;
width:60px;
height:60px;
}
#dog img{
width:100%;
height:100%;
}

/* KONTROLLER */
#controls{
display:flex;
justify-content:center;
gap:20px;
background:#1c2e4a;
padding:10px;
}

button{
font-size:28px;
padding:12px 18px;
border:none;
border-radius:10px;
background:#2f4b7c;
color:white;
}
</style>
</head>

<body>

<div id="game">

<div id="ground"></div>

<div id="player">
<div id="playerSprite"></div>
</div>

<div id="dog">
<img id="dogImg" src="dog-sit.png">
</div>

</div>

<div id="controls">
<button id="left">⬅️</button>
<button id="jump">⬆️</button>
<button id="right">➡️</button>
</div>

<script>

/* ===== STATE ===== */

let vx = 0
let vy = 0
let move = 0
let onGround = true

const player = document.getElementById("player")
const dog = document.getElementById("dog")
const dogImg = document.getElementById("dogImg")
const sprite = document.getElementById("playerSprite")

/* ===== INPUT (SUPERSTABIL) ===== */

function stopMove(){
move = 0
}

right.addEventListener("pointerdown", ()=>move = 1)
left.addEventListener("pointerdown", ()=>move = -1)

right.addEventListener("pointerup", stopMove)
left.addEventListener("pointerup", stopMove)

/* KRITISKT för mobil */
window.addEventListener("pointerup", stopMove)
window.addEventListener("touchend", stopMove)
window.addEventListener("blur", stopMove)

/* HOPP */
jump.addEventListener("pointerdown", ()=>{
if(onGround){
vy = 14
onGround = false
}
})

/* ===== LOOP ===== */

function loop(){

/* RÖRELSE – STOPPAR DIREKT */
vx = move * 5

/* ANIMATION */
if(move !== 0){
sprite.classList.add("walk")
dogImg.src="dog-walk.png"
}else{
sprite.classList.remove("walk")
dogImg.src="dog-sit.png"
}

/* GRAVITY */
vy -= 0.7

let bottom = parseFloat(player.style.bottom || 80)
bottom += vy

/* MARK */
if(bottom <= 80){
bottom = 80
vy = 0
onGround = true
}

/* APPLY */
player.style.bottom = bottom + "px"

/* DOG */
dog.style.left = (player.offsetLeft - 60) + "px"
dog.style.bottom = bottom + "px"

if(!onGround){
dog.style.transform = "translateY(-15px)"
}else{
dog.style.transform = "translateY(0)"
}

requestAnimationFrame(loop)
}

loop()

</script>

</body>
</html>

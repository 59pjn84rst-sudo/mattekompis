<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mattekompis – Grafikläge 22.1</title>

<style>

*{
margin:0;
box-sizing:border-box;
user-select:none;
-webkit-user-select:none;
-webkit-tap-highlight-color:transparent;
}

body{
overflow:hidden;
background:linear-gradient(#7ecbff,#c8f6ff);
}

/* SPEL */

#game{
position:relative;
height:65vh;
overflow:hidden;
}

#world{
position:absolute;
bottom:0;
left:0;
height:100%;
width:100000px;
}

/* SPELARE */

#player{
position:absolute;
left:40%;
bottom:80px;
width:110px;
height:110px;
}

#playerSprite{
width:100%;
height:100%;
background:url("player-idle.PNG") center/contain no-repeat;
}

.walk{
background:url("player-walk.PNG");
background-size:auto 110px;
animation:walk .6s steps(6) infinite;
}

@keyframes walk{
from{background-position:0}
to{background-position:-660px}
}

/* HUND */

#dog{
position:absolute;
bottom:80px;
width:80px;
}

#dog img{width:100%}

/* KULLAR */

.hill{
position:absolute;
width:200px;
height:120px;
background:#27ae60;
border-radius:200px 200px 0 0;
}

/* VATTEN */

.water{
position:absolute;
bottom:0;
height:80px;
background:#3498db;
}

/* BÅT */

.boat{
position:absolute;
bottom:80px;
font-size:40px;
}

/* DEKOR */

.tree{position:absolute;font-size:40px}
.animal{position:absolute;font-size:30px}

/* KONTROLLER */

#controls{
display:flex;
justify-content:center;
gap:20px;
background:#1c2e4a;
padding:10px;
}

button{
font-size:28px;
padding:12px 18px;
border:none;
border-radius:10px;
background:#2f4b7c;
color:white;
touch-action:manipulation;
}

</style>
</head>

<body>

<div id="game">
<div id="world"></div>

<div id="player">
<div id="playerSprite"></div>
</div>

<div id="dog">
<img id="dogImg" src="dog-sit.png">
</div>

</div>

<div id="controls">
<button id="jump">⬆️</button>
<button id="right">➡️</button>
</div>

<audio id="music" src="Music.mp3" loop></audio>
<audio id="jumpSound" src="Jump.mp3"></audio>

<script>

/* VARIABLER */

let worldX=0
let vy=0
let moving=false
let onGround=true

const world=document.getElementById("world")
const player=document.getElementById("player")
const sprite=document.getElementById("playerSprite")
const dog=document.getElementById("dog")
const dogImg=document.getElementById("dogImg")

const music=document.getElementById("music")
const jumpSound=document.getElementById("jumpSound")

let nextX=300

const animals=["🐒","🦉","🐝","🦄","🐜","🐙","🐳","🦀","🦑","🦕","🦖","🐍","🐅","🐆","🦓","🦍","🦧","🦒","🦘","🦌","🐈","🐩","🐓","🦩"]

let hills=[]
let waters=[]
let boats=[]

generateWorld()

/* GENERERA */

function generateWorld(){

for(let i=0;i<60;i++){

if(Math.random()<0.4) createHill()
if(Math.random()<0.3) createWater()

spawnDecor()

nextX+=300

}

}

function createHill(){

let h=document.createElement("div")
h.className="hill"
h.style.left=nextX+"px"
h.style.bottom="80px"

world.appendChild(h)

hills.push({
x:nextX,
width:200,
height:120
})

}

function createWater(){

let width=150+Math.random()*200

let w=document.createElement("div")
w.className="water"
w.style.left=nextX+"px"
w.style.width=width+"px"

world.appendChild(w)

waters.push({
x:nextX,
width:width
})

if(width>220){

let b=document.createElement("div")
b.className="boat"
b.innerText="⛵"
b.style.left=(nextX+width/2-20)+"px"

world.appendChild(b)

boats.push({
x:nextX+width/2-20,
width:40
})

}

}

function spawnDecor(){

if(Math.random()<0.5){

let t=document.createElement("div")
t.className="tree"
t.innerText="🌳"
t.style.left=nextX+"px"
t.style.bottom="80px"

world.appendChild(t)

}

if(Math.random()<0.5){

let a=document.createElement("div")
a.className="animal"
a.innerText=animals[Math.floor(Math.random()*animals.length)]
a.style.left=(nextX+50)+"px"
a.style.bottom="80px"

world.appendChild(a)

}

}

/* KONTROLLER */

right.onpointerdown=()=>{
moving=true
sprite.classList.add("walk")
dogImg.src="dog-walk.png"
music.play().catch(()=>{})
}

right.onpointerup=()=>{
moving=false
sprite.classList.remove("walk")
dogImg.src="dog-sit.png"
}

jump.onpointerdown=()=>{
if(onGround){
vy=14
onGround=false
jumpSound.play()
}
}

/* FYSIK */

function getGroundHeight(px){

let ground=80

// kullar
hills.forEach(h=>{

if(px>h.x && px<h.x+h.width){

let center=h.x+h.width/2
let dist=Math.abs(px-center)

let height=h.height*(1-(dist/(h.width/2)))

ground=80+height

}

})

// vatten (fall)
waters.forEach(w=>{

if(px>w.x && px<w.x+w.width){

ground=-100 // fall ner

}

})

// båt
boats.forEach(b=>{

if(px>b.x && px<b.x+b.width){

ground=80

}

})

return ground

}

/* LOOP */

function loop(){

if(moving) worldX-=4

vy-=0.6

let px = -worldX + window.innerWidth*0.4
let groundHeight = getGroundHeight(px)

let bottom=parseFloat(player.style.bottom||80)
bottom+=vy

if(bottom<=groundHeight){
bottom=groundHeight
vy=0
onGround=true
}else{
onGround=false
}

player.style.bottom=bottom+"px"
world.style.left=worldX+"px"

dog.style.left=(player.offsetLeft-90)+"px"

requestAnimationFrame(loop)

}

loop()

</script>
</body>
</html>

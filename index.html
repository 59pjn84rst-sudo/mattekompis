<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mattekompis 22.6</title>

<style>

*{
margin:0;
box-sizing:border-box;
user-select:none;
-webkit-user-select:none;
-webkit-tap-highlight-color:transparent;
}

body{
overflow:hidden;
background:linear-gradient(#7ecbff,#c8f6ff);
}

/* SPEL */

#game{
position:relative;
height:65vh;
overflow:hidden;
}

#world{
position:absolute;
bottom:0;
left:0;
height:100%;
width:200000px;
}

/* SPELARE */

#player{
position:absolute;
left:40%;
bottom:80px;
width:82px;
height:82px;
}

#playerSprite{
width:100%;
height:100%;
background:url("player-idle.PNG") center/contain no-repeat;
}

.walk{
background:url("player-walk.PNG");
background-size:auto 82px;
animation:walk .6s steps(6) infinite;
}

@keyframes walk{
from{background-position:0}
to{background-position:-492px}
}

/* HUND */

#dog{
position:absolute;
bottom:80px;
width:25px; /* 30% */
}

/* MARK */

.segment{position:absolute}

.ground{background:#2ecc71}

.hill{
background:linear-gradient(#2ecc71,#27ae60);
}

.water{
background:#3498db;
}

/* BÅT */

.boat{
position:absolute;
bottom:80px;
font-size:40px;
transform:scale(2);
}

/* TRÄD */

.tree{
position:absolute;
font-size:60px; /* 150% */
z-index:2;
}

.palm{
position:absolute;
font-size:60px;
z-index:2;
}

/* DJUR */

.animal{
position:absolute;
font-size:40px;
z-index:1;
}

/* KONTROLLER */

#controls{
display:flex;
justify-content:center;
gap:20px;
background:#1c2e4a;
padding:10px;
}

button{
font-size:28px;
padding:12px 18px;
border:none;
border-radius:10px;
background:#2f4b7c;
color:white;
touch-action:manipulation;
}

</style>
</head>

<body>

<div id="game">
<div id="world"></div>

<div id="player">
<div id="playerSprite"></div>
</div>

<div id="dog">
<img src="dog-sit.png">
</div>

</div>

<div id="controls">
<button id="left">⬅️</button>
<button id="jump">⬆️</button>
<button id="right">➡️</button>
</div>

<script>

/* VARIABLER */

let worldX=0
let vy=0
let onGround=true
let moveDir=0
let onBoat=null

const world=document.getElementById("world")
const player=document.getElementById("player")

let segments=[]
let boats=[]

const animals=["🐒","🦉","🐝","🦄","🐜","🐙","🐳","🦀","🦑","🦕","🦖","🐍","🐅","🐆","🦓","🦍","🦧","🦒","🦘","🦌","🐈","🐩","🐓","🦩"]

/* GENERERA */

let x=0

for(let i=0;i<80;i++){

let r=Math.random()

if(r<0.5) createGround(220)
else if(r<0.75) createHill(220)
else createWater(300)

spawnDecor(x)

x+=260

}

/* MARK */

function createGround(w){

segments.push({type:"ground",x:x,width:w})

let d=document.createElement("div")
d.className="segment ground"
d.style.left=x+"px"
d.style.width=w+"px"
d.style.height="80px"
d.style.bottom="0px"

world.appendChild(d)

}

/* KULLAR */

function createHill(w){

segments.push({type:"hill",x:x,width:w})

let d=document.createElement("div")
d.className="segment hill"
d.style.left=x+"px"
d.style.width=w+"px"
d.style.height="80px"
d.style.bottom="80px"
d.style.borderRadius="50% 50% 0 0"

world.appendChild(d)

}

/* VATTEN + BÅT */

function createWater(w){

segments.push({type:"water",x:x,width:w})

let d=document.createElement("div")
d.className="segment water"
d.style.left=x+"px"
d.style.width=w+"px"
d.style.height="80px"
d.style.bottom="0px"

world.appendChild(d)

/* båt */

let bx=x+w/2-80

let b=document.createElement("div")
b.className="boat"
b.innerText="⛵"
b.style.left=bx+"px"

world.appendChild(b)

boats.push({
x:bx,
width:160,
speed:1.2
})

}

/* DEKOR (glesare!) */

function spawnDecor(px){

if(Math.random()<0.2){

let count=2+Math.floor(Math.random()*2)

for(let i=0;i<count;i++){

let el=document.createElement("div")

if(Math.random()<0.8){
el.className="palm"
el.innerText="🌴"
}else{
el.className="tree"
el.innerText="🌳"
}

el.style.left=(px+i*40)+"px"
el.style.bottom="80px"

world.appendChild(el)

}

}

/* djur */

if(Math.random()<0.3){

let a=document.createElement("div")
a.className="animal"
a.innerText=animals[Math.floor(Math.random()*animals.length)]
a.style.left=(px+60)+"px"
a.style.bottom="80px"

world.appendChild(a)

}

}

/* KONTROLLER – FIX */

function stopMove(){
moveDir=0
}

right.onpointerdown=()=>moveDir=1
left.onpointerdown=()=>moveDir=-1

right.onpointerup=stopMove
left.onpointerup=stopMove

// EXTRA FIX (viktigt!)
window.addEventListener("pointerup",stopMove)
window.addEventListener("touchend",stopMove)

jump.onpointerdown=()=>{
if(onGround){
vy=12
onGround=false
}
}

/* NORMALFÖRDELNING */

function hillHeight(px,s){

let center=s.x+s.width/2
let sigma=s.width/4

let d=px-center

let h=80*Math.exp(-(d*d)/(2*sigma*sigma))

return 80+h

}

/* MARK */

function getGround(px){

let ground=80
onBoat=null

// 1. först segment
for(let s of segments){

if(px>=s.x && px<=s.x+s.width){

if(s.type==="ground") ground=80

if(s.type==="hill") ground=hillHeight(px,s)

if(s.type==="water") ground=-200

}

}

// 2. sen båt (override!)
for(let b of boats){

if(px>=b.x && px<=b.x+b.width){

ground=80
onBoat=b

}

}

return ground

}

/* LOOP */

function loop(){

if(moveDir!==0){
worldX-=moveDir*4
}

// flytta båtar
boats.forEach(b=>b.x+=b.speed)

vy-=0.6

let px=-worldX + window.innerWidth*0.4
let ground=getGround(px)

let bottom=parseFloat(player.style.bottom||80)
bottom+=vy

if(bottom<=ground){
bottom=ground
vy=0
onGround=true
}else{
onGround=false
}

// stå på båt
if(onBoat){
worldX-=onBoat.speed
}

player.style.bottom=bottom+"px"
world.style.left=worldX+"px"

requestAnimationFrame(loop)

}

loop()

</script>
</body>
</html>

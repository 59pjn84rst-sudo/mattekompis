<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mattekompis v29</title>

<style>

*{margin:0;box-sizing:border-box;}
body{overflow:hidden;background:linear-gradient(#7ecbff,#c8f6ff);}

#game{position:relative;height:65vh;overflow:hidden;}
#world{position:absolute;bottom:0;left:0;height:100%;width:20000px;}

#player{
position:absolute;
left:40%;
bottom:80px;
width:160px;
height:160px;
z-index:5;
}

#playerSprite{
width:100%;
height:100%;
background:url("player-idle.PNG") center/contain no-repeat;
}

.walk{
background:url("player-walk.PNG") left center;
background-size:auto 160px;
animation:walk .6s steps(6) infinite;
}

@keyframes walk{
from{background-position:0}
to{background-position:-960px}
}

#dog{position:absolute;width:60px;height:60px;z-index:4;}
#dog img{width:100%;height:100%;}

/* TERRÄNG */

.segment{position:absolute;height:80px;}

.ground{background:#2ecc71;}
.water{background:#3498db;}
.lava{background:linear-gradient(#ff3c00,#ff9a00);}
.island{background:#ffe066;height:40px;border-radius:20px;}
.hill{background:linear-gradient(#2ecc71,#27ae60);height:80px;}

/* PALM */
.palm{position:absolute;font-size:120px;}

/* 67 */
.platform67{position:absolute;font-size:70px;}

#controls{
display:flex;justify-content:center;gap:20px;
background:#1c2e4a;padding:10px;
}

button{
font-size:28px;padding:12px;border-radius:10px;
background:#2f4b7c;color:white;border:none;
}

</style>
</head>

<body>

<div id="game">
<div id="world"></div>

<div id="player"><div id="playerSprite"></div></div>
<div id="dog"><img id="dogImg" src="dog-sit.png"></div>
</div>

<div id="controls">
<button id="left">⬅️</button>
<button id="jump">⬆️</button>
<button id="right">➡️</button>
</div>

<script>

/* STATE */

let worldX=0, vx=0, vy=0
let move=0, onGround=true

const world=document.getElementById("world")
const player=document.getElementById("player")
const dog=document.getElementById("dog")
const dogImg=document.getElementById("dogImg")
const sprite=document.getElementById("playerSprite")

let segments=[]
let platforms67=[]

let x=0

/* ===== BYGG BANAN SOM I DIN SKISS ===== */

/* START */
createHill(200)
x+=220
createGround(200)
x+=220

/* VATTEN + ÖAR */
createWater(300)
createIsland(x+100)
createIsland(x+200)
x+=320

/* KULLE */
createHill(250)
x+=260

/* HÅL */
createHole(200)
x+=220

/* LAVA + 67 */
createLava(300)
create67(x+100)
x+=320

/* VULKAN */
createBigHill(300)
createLava(100, x+100)
x+=320

/* SLUT */
createGround(500)

/* ===== CREATE ===== */

function createGround(w){
segments.push({type:"ground",x:x,width:w})
addDiv("ground",x,w,0)
}

function createHill(w){
segments.push({type:"hill",x:x,width:w})
addDiv("hill",x,w,80)
}

function createBigHill(w){
segments.push({type:"hill",x:x,width:w,height:100})
addDiv("hill",x,w,80)
}

function createWater(w){
segments.push({type:"water",x:x,width:w})
addDiv("water",x,w,0)
}

function createIsland(px){
segments.push({type:"island",x:px,width:120})

addDiv("island",px,120,80)

let palm=document.createElement("div")
palm.className="palm"
palm.innerText="🌴"
palm.style.left=(px-20)+"px"
palm.style.bottom="120px"
world.appendChild(palm)
}

function createHole(w){
segments.push({type:"hole",x:x,width:w})
}

function createLava(w, customX=null){

let pos = customX!==null ? customX : x

segments.push({type:"lava",x:pos,width:w})
addDiv("lava",pos,w,0)
}

function create67(px){

let el=document.createElement("div")
el.className="platform67"
el.innerText="67"
el.style.left=px+"px"
el.style.bottom="80px"

world.appendChild(el)

platforms67.push({x:px,width:80,speed:2})
}

function addDiv(type,x,w,bottom){

let d=document.createElement("div")
d.className="segment "+type
d.style.left=x+"px"
d.style.width=w+"px"
d.style.bottom=bottom+"px"
world.appendChild(d)

}

/* INPUT */

function stop(){move=0}

right.onpointerdown=()=>move=1
left.onpointerdown=()=>move=-1

right.onpointerup=stop
left.onpointerup=stop

window.addEventListener("pointerup",stop)
window.addEventListener("touchend",stop)

jump.onpointerdown=()=>{
if(onGround){
vy=14
onGround=false
}
}

/* MARK */

function getGround(px){

// 67
for(let p of platforms67){
if(px>=p.x && px<=p.x+p.width){
return 80
}
}

for(let s of segments){

if(px>=s.x && px<=s.x+s.width){

if(s.type==="ground") return 80

if(s.type==="hill"){
let t=(px-s.x)/s.width
return 80 + 60*Math.sin(t*Math.PI)
}

if(s.type==="island") return 120

if(s.type==="water" || s.type==="hole" || s.type==="lava"){
return null
}
}
}

return 80
}

/* LOOP */

function loop(){

vx += (move*5 - vx)*0.2
worldX -= vx

if(Math.abs(vx)>0.5){
sprite.classList.add("walk")
dogImg.src="dog-walk.png"
}else{
sprite.classList.remove("walk")
dogImg.src="dog-sit.png"
}

vy -= 0.7

let px=-worldX + window.innerWidth*0.4
let ground=getGround(px)

let bottom=parseFloat(player.style.bottom||80)

if(ground===null){
bottom += vy
onGround=false
}else{
if(bottom<=ground){
bottom=ground
vy=0
onGround=true
}
}

player.style.bottom=bottom+"px"
world.style.left=worldX+"px"

dog.style.left=(player.offsetLeft-60)+"px"
dog.style.bottom=bottom+"px"

/* 67 rör sig */
platforms67.forEach(p=>p.x-=p.speed)
document.querySelectorAll(".platform67").forEach((el,i)=>{
el.style.left=platforms67[i].x+"px"
})

requestAnimationFrame(loop)

}

loop()

</script>
</body>
</html>

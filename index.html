<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mattekompis</title>

<style>

*{margin:0;box-sizing:border-box;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}

body{overflow:hidden;background:linear-gradient(#7ecbff,#c8f6ff);}

#game{position:relative;height:65vh;overflow:hidden;}
#world{position:absolute;bottom:0;left:0;height:100%;width:3000px;}

#ground{
position:absolute;
bottom:0;
height:80px;
width:100%;
background:#2ecc71;
}

.hill{
position:absolute;
bottom:80px;
height:120px;
width:200px;
left:400px;
background:linear-gradient(180deg,#6be585,#2ecc71,#1e9e5a);
border-radius:80px 80px 0 0;
}

#player{
position:absolute;
left:40%;
bottom:80px;
width:160px;
height:160px;
display:flex;
align-items:flex-end;
}

#playerSprite{
width:100%;
height:100%;
background:url("player-idle.PNG") center bottom no-repeat;
background-size:contain;
transform:translateY(20px);
}

#dog{
position:absolute;
width:60px;
height:60px;
display:flex;
align-items:flex-end;
}

#dog img{
width:100%;
height:100%;
object-fit:contain;
transform:translateY(10px);
}

#controls{
display:flex;
justify-content:center;
gap:20px;
background:#1c2e4a;
padding:10px;
}

button{
font-size:28px;
padding:12px 18px;
border-radius:10px;
background:#2f4b7c;
color:white;
border:none;
}

</style>
</head>

<body>

<div id="game">

<div id="world">
<div id="ground"></div>
<div class="hill"></div>
</div>

<div id="player"><div id="playerSprite"></div></div>
<div id="dog"><img src="dog-sit.png"></div>

</div>

<div id="controls">
<button id="left">⬅️</button>
<button id="jump">⬆️</button>
<button id="right">➡️</button>
</div>

<script>

/* STATE */
let vx=0, vy=0, move=0
let onGround=true
let worldX=0

const player=document.getElementById("player")
const dog=document.getElementById("dog")
const world=document.getElementById("world")

const hill = { x:400, w:200, h:120 }

/* INPUT */
function stopMove(){ move=0 }

right.onpointerdown=()=>move=1
left.onpointerdown=()=>move=-1

right.onpointerup=stopMove
left.onpointerup=stopMove

window.addEventListener("pointerup",stopMove)
window.addEventListener("touchend",stopMove)

/* 🔥 HOPP-FUNKTION */
function doJump(){
if(onGround){
vy = 14
onGround = false
}
}

/* 🔥 flera sätt att trigga hopp */
jump.addEventListener("pointerdown", doJump)
jump.addEventListener("touchstart", doJump)
jump.addEventListener("click", doJump)

/* LOOP */
function loop(){

let px = -worldX + player.offsetLeft + player.offsetWidth*0.4
let bottom = parseFloat(player.style.bottom || 80)

let blocked=false
let onTop=false

/* STOPP VID KANT */
if(
px > hill.x - 5 &&
px < hill.x + 5 &&
bottom <= 80
){
blocked=true
}

/* LANDNING PÅ KULLEN */
if(
px >= hill.x &&
px <= hill.x + hill.w &&
vy <= 0 &&
bottom >= 80 + hill.h - 20
){
bottom = 80 + hill.h
vy = 0
onGround = true
onTop = true
}

/* RÖRELSE */
if(!blocked){
vx = move * 5
}else{
vx = 0
}

worldX -= vx
world.style.left = worldX + "px"

/* GRAVITY */
vy -= 0.7

/* MARK */
if(!onTop){

if(bottom <= 80){
bottom = 80
vy = 0
onGround = true
}else{
bottom += vy
onGround = false
}

}

/* APPLY */
player.style.bottom = bottom + "px"

/* HUND */
dog.style.left = (player.offsetLeft - 60) + "px"
dog.style.bottom = bottom + "px"

requestAnimationFrame(loop)

}

loop()

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mattekompis</title>

<style>
*{margin:0;box-sizing:border-box;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}

body{overflow:hidden;background:linear-gradient(#7ecbff,#c8f6ff);font-family:sans-serif;}

#game{position:relative;height:65vh;overflow:hidden;}
#world{position:absolute;bottom:0;left:0;height:100%;width:6000px;}

#ground{position:absolute;bottom:0;height:80px;width:100%;background:#2ecc71;}

.water{position:absolute;bottom:0;height:80px;background:#3498db;}
.lava{position:absolute;bottom:0;height:80px;background:linear-gradient(#ff3c00,#ff9a00);}

.island{
position:absolute;
bottom:80px;
width:140px;
height:40px;
background:#ffe066;
border-radius:20px;
}

.palm{position:absolute;font-size:120px;}

.hill{
position:absolute;
bottom:80px;
height:120px;
width:200px;
left:400px;
background:linear-gradient(180deg,#6be585,#2ecc71,#1e9e5a);
border-radius:80px 80px 0 0;
}

/* 🟣 båt */
#boat{
position:absolute;
width:120px;
height:60px;
bottom:110px;
background:url("67.jpg") center/contain no-repeat;
}

/* 🏁 FLAGGA */
#goal{
position:absolute;
left:1500px;
bottom:80px;
font-size:80px;
}

/* 🎉 WIN SCREEN */
#win{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
font-size:32px;
z-index:10;
}

#win button{
margin-top:20px;
font-size:24px;
padding:10px 20px;
border-radius:10px;
border:none;
background:#2ecc71;
color:white;
}

/* SPELARE */
#player{
position:absolute;
left:40%;
bottom:80px;
width:160px;
height:160px;
display:flex;
align-items:flex-end;
}

#playerSprite{
width:100%;
height:100%;
background:url("player-idle.PNG") center bottom no-repeat;
background-size:contain;
transform:translateY(20px);
}

/* HUND */
#dog{
position:absolute;
width:60px;
height:60px;
display:flex;
align-items:flex-end;
}

#dog img{
width:100%;
height:100%;
object-fit:contain;
transform:translateY(10px);
}

/* KONTROLLER */
#controls{
display:flex;
justify-content:center;
gap:20px;
background:#1c2e4a;
padding:10px;
}

button{
font-size:28px;
padding:12px 18px;
border-radius:10px;
background:#2f4b7c;
color:white;
border:none;
}
</style>
</head>

<body>

<div id="game">

<div id="world">

<div id="ground"></div>

<div class="hill"></div>

<div class="water" style="left:700px;width:300px;"></div>

<div class="island" style="left:760px;"></div>
<div class="island" style="left:880px;"></div>

<div class="palm" style="left:750px;bottom:80px;">🌴</div>
<div class="palm" style="left:870px;bottom:80px;">🌴</div>

<div class="lava" style="left:1100px;width:300px;"></div>

<div id="boat"></div>

<!-- 🏁 mål -->
<div id="goal">🏁</div>

</div>

<div id="player"><div id="playerSprite"></div></div>
<div id="dog"><img src="dog-sit.png"></div>

</div>

<!-- 🎉 WIN -->
<div id="win">
<div>🎉 Du klarade banan!</div>
<button onclick="location.reload()">Spela igen</button>
</div>

<div id="controls">
<button id="left">⬅️</button>
<button id="jump">⬆️</button>
<button id="right">➡️</button>
</div>

<script>

/* STATE */
let vx=0, vy=0, move=0
let onGround=true
let worldX=0
let won=false

const player=document.getElementById("player")
const dog=document.getElementById("dog")
const world=document.getElementById("world")
const boat=document.getElementById("boat")
const win=document.getElementById("win")

const hill={x:400,w:200,h:120}
const islands=[{x:760,w:140},{x:880,w:140}]
const water={x:700,w:300}
const lava={x:1100,w:300}
const goalX=1500

let boatX=1150
let boatDir=1
const boatW=120
const boatY=110

/* INPUT */
function stop(){move=0}
function pressRight(){move=1}
function pressLeft(){move=-1}

right.addEventListener("touchstart",pressRight)
left.addEventListener("touchstart",pressLeft)
right.addEventListener("mousedown",pressRight)
left.addEventListener("mousedown",pressLeft)

right.addEventListener("touchend",stop)
left.addEventListener("touchend",stop)
right.addEventListener("mouseup",stop)
left.addEventListener("mouseup",stop)

window.addEventListener("touchend",stop)
window.addEventListener("mouseup",stop)

/* HOPP */
function jumpNow(){
vy=14
onGround=false
}
jump.addEventListener("touchstart",jumpNow)
jump.addEventListener("mousedown",jumpNow)

/* LOOP */
function loop(){

if(won) return

let px=-worldX+player.offsetLeft+player.offsetWidth*0.4
let bottom=parseFloat(player.style.bottom||80)

vx=move*5

/* KULLE */
if(px>hill.x-10&&px<hill.x&&bottom<=82&&vx>0){vx=0}

if(px>hill.x&&px<hill.x+hill.w&&vy<0&&bottom>80+hill.h-10){
bottom=80+hill.h
vy=0
onGround=true
}

/* ÖAR */
let onIsland=false
for(let i of islands){
let top=120
if(px>i.x&&px<i.x+i.w&&vy<0&&bottom>=top-15){
bottom=top
vy=0
onGround=true
onIsland=true
}
}

/* BÅT */
let onBoat=false
let boatTop=boatY+20

if(px>boatX&&px<boatX+boatW&&vy<0&&bottom>=boatTop-10){
bottom=boatTop
vy=0
onGround=true
onBoat=true
worldX-=boatDir*2
}

/* WIN */
if(px > goalX){
won=true
win.style.display="flex"
}

/* WORLD */
worldX-=vx
world.style.left=worldX+"px"

/* BÅT */
boatX+=boatDir*2
if(boatX<1100||boatX>1300)boatDir*=-1
boat.style.left=boatX+"px"

/* GRAVITY */
vy-=0.7
bottom+=vy

/* MARK */
if(!(px>water.x&&px<water.x+water.w)&&
   !(px>lava.x&&px<lava.x+lava.w)&&
   !onIsland&&!onBoat){
if(bottom<=80){
bottom=80
vy=0
onGround=true
}
}

/* APPLY */
player.style.bottom=bottom+"px"
dog.style.left=(player.offsetLeft-60)+"px"
dog.style.bottom=bottom+"px"

requestAnimationFrame(loop)
}

loop()

</script>
</body>
</html>

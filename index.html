<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mattekompis</title>

<link rel="apple-touch-icon" href="icon.PNG">

<style>

body{
margin:0;
font-family:system-ui;
overflow:hidden;
background:#60a5fa;
}

#startScreen{
position:fixed;
inset:0;
background:linear-gradient(#60a5fa,#86efac);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
z-index:100;
}

#startLogo{
width:160px;
margin-bottom:20px;
}

#startDog{
width:120px;
animation:dogRun 2s forwards;
}

@keyframes dogRun{
0%{transform:translateX(-200px)}
100%{transform:translateX(0)}
}

#startButton{
font-size:1.4rem;
padding:14px 28px;
border:none;
border-radius:18px;
background:#2563eb;
color:white;
margin-top:20px;
}

#game{
position:relative;
height:60vh;
overflow:hidden;
background:linear-gradient(#60a5fa,#86efac);
}

#world{
position:absolute;
height:100%;
width:6000px;
bottom:0;
left:0;
}

.ground{
position:absolute;
bottom:0;
height:80px;
width:6000px;
background:#22c55e;
}

.obstacle{
position:absolute;
bottom:80px;
width:50px;
height:40px;
background:#7c3aed;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
}

#player{
position:absolute;
bottom:80px;
left:40%;
width:80px;
}

#dog{
position:absolute;
bottom:80px;
left:20%;
width:80px;
}

#controls{
display:flex;
justify-content:center;
gap:30px;
background:#0f172a;
padding:10px;
}

button.control{
font-size:1.8rem;
padding:10px 20px;
border-radius:12px;
border:none;
background:#1e3a8a;
color:white;
}

#mathOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
}

.mathBox{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
}

input{
font-size:1.4rem;
width:120px;
text-align:center;
}

#message{
position:fixed;
top:100px;
left:50%;
transform:translateX(-50%);
background:white;
padding:10px 20px;
border-radius:12px;
display:none;
}

</style>
</head>

<body>

<div id="startScreen">

<img src="icon.PNG" id="startLogo">

<img src="dog-walk.png" id="startDog">

<h1>Mattekompis</h1>

<p>Redo för matteäventyr?</p>

<button id="startButton">Starta</button>

</div>

<div id="game">

<div id="world">

<div class="ground"></div>

<div class="obstacle" style="left:900px">?</div>
<div class="obstacle" style="left:1600px">?</div>
<div class="obstacle" style="left:2400px">?</div>
<div class="obstacle" style="left:3200px">?</div>
<div class="obstacle" style="left:4000px">?</div>

</div>

<img src="player-idle.png" id="player">

<img src="dog-sit.png" id="dog">

</div>

<div id="controls">

<button class="control" id="leftBtn">⬅️</button>
<button class="control" id="jumpBtn">⬆️</button>
<button class="control" id="rightBtn">➡️</button>

</div>

<div id="mathOverlay">

<div class="mathBox">

<h2 id="mathQuestion"></h2>

<input id="answerInput">

<br><br>

<button onclick="checkAnswer()">Klar</button>

</div>

</div>

<div id="message"></div>

<audio id="music" src="Music.mp3" loop></audio>
<audio id="jumpSound" src="Jump.mp3"></audio>
<audio id="correctSound" src="Correct.mp3"></audio>

<script>

let worldX=0
let right=false
let left=false
let vy=0
let onGround=true
let paused=false

let tasks=["39+15","63+28","58+34","37+43","46+46"]
let taskIndex=0
let correct=0

const player=document.getElementById("player")
const dog=document.getElementById("dog")
const world=document.getElementById("world")

startButton.onclick=()=>{
startScreen.style.display="none"
music.volume=.3
music.play()
}

leftBtn.onpointerdown=()=>left=true
leftBtn.onpointerup=()=>left=false

rightBtn.onpointerdown=()=>right=true
rightBtn.onpointerup=()=>right=false

jumpBtn.onpointerdown=()=>{
if(onGround){
vy=12
onGround=false
jumpSound.play()
}
}

function showMath(){

paused=true

let t=tasks[taskIndex]

let parts=t.split("+")
correct=parseInt(parts[0])+parseInt(parts[1])

mathQuestion.innerText=t

answerInput.value=""

mathOverlay.style.display="flex"

}

function checkAnswer(){

if(parseInt(answerInput.value)==correct){

correctSound.play()

mathOverlay.style.display="none"

taskIndex++

paused=false

showMessage("Bra jobbat! ⭐")

if(taskIndex>=tasks.length){
showMessage("Läxan klar! 🎉")
}

}else{

showMessage("Bra försök! Testa igen 🙂")

}

}

function showMessage(text){

message.innerText=text
message.style.display="block"

setTimeout(()=>{

message.style.display="none"

},2000)

}

function loop(){

if(!paused){

if(right) worldX-=3
if(left) worldX+=3

vy-=0.6

let bottom=parseFloat(player.style.bottom||80)

bottom+=vy

if(bottom<=80){
bottom=80
vy=0
onGround=true
}

world.style.left=worldX+"px"

player.style.bottom=bottom+"px"

dog.style.left=(player.offsetLeft-120)+"px"

document.querySelectorAll(".obstacle").forEach(o=>{

let pr=player.getBoundingClientRect()
let r=o.getBoundingClientRect()

if(pr.right>r.left && pr.left<r.right){

showMath()
o.remove()

}

})

}

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>

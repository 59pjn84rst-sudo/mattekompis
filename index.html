<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mattekompis – kullar korrekt</title>

<style>

/* RESET */
*{
margin:0;
box-sizing:border-box;
-webkit-user-select:none;
-webkit-tap-highlight-color:transparent;
}

button{
-webkit-appearance:none;
appearance:none;
outline:none;
border:none;
}

/* BODY */
body{
overflow:hidden;
background:linear-gradient(#7ecbff,#c8f6ff);
}

/* SPEL */
#game{
position:relative;
height:65vh;
overflow:hidden;
}

#world{
position:absolute;
bottom:0;
left:0;
height:100%;
width:3000px;
}

/* MARK */
#ground{
position:absolute;
bottom:0;
height:80px;
width:100%;
background:#2ecc71;
}

/* KULLAR (visuella) */
.hill{
position:absolute;
bottom:80px;
height:80px;
background:linear-gradient(#2ecc71,#27ae60);
border-radius:50% 50% 0 0;
}

/* SPELARE */
#player{
position:absolute;
left:40%;
bottom:80px;
width:160px;
height:160px;
display:flex;
align-items:flex-end;
}

#playerSprite{
width:100%;
height:100%;
background:url("player-idle.PNG") center bottom no-repeat;
background-size:contain;
transform: translateY(20px);
}

/* HUND */
#dog{
position:absolute;
width:60px;
height:60px;
display:flex;
align-items:flex-end;
}

#dog img{
width:100%;
height:100%;
object-fit:contain;
transform: translateY(10px);
}

/* KONTROLLER */
#controls{
display:flex;
justify-content:center;
gap:20px;
background:#1c2e4a;
padding:10px;
}

button{
font-size:28px;
padding:12px 18px;
border-radius:10px;
background:#2f4b7c;
color:white;
}

</style>
</head>

<body>

<div id="game">

<div id="world">

<div id="ground"></div>

<!-- kullar -->
<div class="hill" style="left:300px;width:300px;"></div>
<div class="hill" style="left:900px;width:300px;"></div>

</div>

<div id="player">
<div id="playerSprite"></div>
</div>

<div id="dog">
<img src="dog-sit.png">
</div>

</div>

<div id="controls">
<button id="left">⬅️</button>
<button id="jump">⬆️</button>
<button id="right">➡️</button>
</div>

<script>

/* STATE */
let vx = 0
let vy = 0
let move = 0
let onGround = true
let worldX = 0

const player = document.getElementById("player")
const dog = document.getElementById("dog")
const world = document.getElementById("world")

/* INPUT */
function stopMove(){ move = 0 }

right.onpointerdown = ()=>move = 1
left.onpointerdown  = ()=>move = -1

right.onpointerup = stopMove
left.onpointerup  = stopMove

window.addEventListener("pointerup", stopMove)
window.addEventListener("touchend", stopMove)

/* HOPP */
jump.onpointerdown = ()=>{
if(onGround){
vy = 14
onGround = false
}
}

/* MARKHÖJD */
function getGround(px){

let hills = [
{ x:300, w:300 },
{ x:900, w:300 }
]

for(let h of hills){

if(px >= h.x && px <= h.x + h.w){

let t = (px - h.x) / h.w
return 80 + 60 * Math.sin(t * Math.PI)

}

}

return 80
}

/* LOOP */
function loop(){

/* rörelse */
vx = move * 5
worldX -= vx
world.style.left = worldX + "px"

/* gravity */
vy -= 0.7

/* 🔥 BONUS: exakt fotpunkt */
let px = -worldX + player.offsetLeft + player.offsetWidth * 0.4

let ground = getGround(px)

let bottom = parseFloat(player.style.bottom || 80)

/* landning */
if(bottom <= ground){
bottom = ground
vy = 0
onGround = true
}else{
bottom += vy
onGround = false
}

/* apply */
player.style.bottom = bottom + "px"

/* hund följer */
dog.style.left = (player.offsetLeft - 60) + "px"
dog.style.bottom = bottom + "px"

requestAnimationFrame(loop)
}

loop()

</script>

</body>
</html>

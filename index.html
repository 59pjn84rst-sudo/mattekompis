<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mattekompis – Grafikläge 22.3</title>

<style>

*{
margin:0;
box-sizing:border-box;
user-select:none;
-webkit-user-select:none;
-webkit-tap-highlight-color:transparent;
}

body{
overflow:hidden;
background:linear-gradient(#7ecbff,#c8f6ff);
}

/* SPEL */

#game{
position:relative;
height:65vh;
overflow:hidden;
}

#world{
position:absolute;
bottom:0;
left:0;
height:100%;
width:200000px;
}

/* SPELARE */

#player{
position:absolute;
left:40%;
bottom:80px;
width:110px;
height:110px;
}

#playerSprite{
width:100%;
height:100%;
background:url("player-idle.PNG") center/contain no-repeat;
}

.walk{
background:url("player-walk.PNG");
background-size:auto 110px;
animation:walk .6s steps(6) infinite;
}

@keyframes walk{
from{background-position:0}
to{background-position:-660px}
}

/* HUND */

#dog{
position:absolute;
bottom:80px;
width:80px;
}
#dog img{width:100%}

/* SEGMENT */

.segment{position:absolute}
.ground{background:#2ecc71}
.hill{background:#27ae60}
.water{background:#3498db}

/* BÅT */

.boat{
position:absolute;
bottom:80px;
font-size:40px;
transform:scale(2); /* dubbelt så lång */
}

/* DEKOR */

.tree{
position:absolute;
font-size:160px; /* 4x */
}

.animal{
position:absolute;
font-size:60px; /* 2x */
}

/* KONTROLLER */

#controls{
display:flex;
justify-content:center;
gap:20px;
background:#1c2e4a;
padding:10px;
}

button{
font-size:28px;
padding:12px 18px;
border:none;
border-radius:10px;
background:#2f4b7c;
color:white;
touch-action:manipulation;
}

</style>
</head>

<body>

<div id="game">
<div id="world"></div>

<div id="player">
<div id="playerSprite"></div>
</div>

<div id="dog">
<img id="dogImg" src="dog-sit.png">
</div>

</div>

<div id="controls">
<button id="left">⬅️</button>
<button id="jump">⬆️</button>
<button id="right">➡️</button>
</div>

<script>

/* VARIABLER */

let worldX=0
let vy=0
let onGround=true

let moveDir=0 // -1 vänster, 1 höger

const world=document.getElementById("world")
const player=document.getElementById("player")
const sprite=document.getElementById("playerSprite")
const dog=document.getElementById("dog")
const dogImg=document.getElementById("dogImg")

const animals=["🐒","🦉","🐝","🦄","🐜","🐙","🐳","🦀","🦑","🦕","🦖","🐍","🐅","🐆","🦓","🦍","🦧","🦒","🦘","🦌","🐈","🐩","🐓","🦩"]

let segments=[]
let boats=[]

/* GENERERA */

let x=0

for(let i=0;i<80;i++){

let r=Math.random()

if(r<0.5) createGround(200)
else if(r<0.75) createHill(220)
else createWater(250)

spawnDecor(x)

x+=250

}

function createGround(w){

segments.push({type:"ground",x:x,width:w})

let d=document.createElement("div")
d.className="segment ground"
d.style.left=x+"px"
d.style.width=w+"px"
d.style.height="80px"
d.style.bottom="0px"

world.appendChild(d)

}

function createHill(w){

segments.push({type:"hill",x:x,width:w})

let d=document.createElement("div")
d.className="segment hill"
d.style.left=x+"px"
d.style.width=w+"px"
d.style.height="120px"
d.style.bottom="80px"
d.style.borderRadius="200px 200px 0 0"

world.appendChild(d)

}

function createWater(w){

segments.push({type:"water",x:x,width:w})

let d=document.createElement("div")
d.className="segment water"
d.style.left=x+"px"
d.style.width=w+"px"
d.style.height="80px"
d.style.bottom="0px"

world.appendChild(d)

/* båt */

let bx=x+w/2-40

let b=document.createElement("div")
b.className="boat"
b.innerText="⛵"
b.style.left=bx+"px"

world.appendChild(b)

boats.push({x:bx,width:80}) // dubbelt så bred

}

/* DEKOR */

function spawnDecor(px){

if(Math.random()<0.6){

let t=document.createElement("div")
t.className="tree"
t.innerText="🌳"
t.style.left=px+"px"
t.style.bottom="80px"
world.appendChild(t)

}

if(Math.random()<0.5){

let a=document.createElement("div")
a.className="animal"
a.innerText=animals[Math.floor(Math.random()*animals.length)]
a.style.left=(px+50)+"px"
a.style.bottom="80px"
world.appendChild(a)

}

}

/* KONTROLLER */

right.onpointerdown=()=>{
moveDir=1
sprite.classList.add("walk")
dogImg.src="dog-walk.png"
}

right.onpointerup=()=>{
moveDir=0
sprite.classList.remove("walk")
dogImg.src="dog-sit.png"
}

left.onpointerdown=()=>{
moveDir=-1
sprite.classList.add("walk")
}

left.onpointerup=()=>{
moveDir=0
sprite.classList.remove("walk")
}

jump.onpointerdown=()=>{
if(onGround){
vy=14
onGround=false
}
}

/* MARKHÖJD (FIXAD!) */

function getGround(px){

let ground=80

for(let s of segments){

if(px>=s.x && px<=s.x+s.width){

if(s.type==="ground"){
ground=80
}

if(s.type==="hill"){

let t=(px-s.x)/s.width

// viktig fix: clamp
if(t<0) t=0
if(t>1) t=1

let height=Math.sin(t*Math.PI)*120

ground=80+height

}

if(s.type==="water"){
ground=-200
}

}

}

/* båt PRIORITERAS */

for(let b of boats){

if(px>=b.x && px<=b.x+b.width){

ground=80

}

}

return ground

}

/* LOOP */

function loop(){

if(moveDir!==0){
worldX-=moveDir*4
}

vy-=0.6

let px=-worldX + window.innerWidth*0.4

let ground=getGround(px)

let bottom=parseFloat(player.style.bottom||80)
bottom+=vy

// viktig fix: fotpunkt istället för mitten
if(bottom<=ground){
bottom=ground
vy=0
onGround=true
}else{
onGround=false
}

player.style.bottom=bottom+"px"
world.style.left=worldX+"px"

dog.style.left=(player.offsetLeft-90)+"px"

requestAnimationFrame(loop)

}

loop()

</script>
</body>
</html>

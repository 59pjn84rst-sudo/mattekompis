<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mattekompis</title>

<style>
*{
margin:0;
box-sizing:border-box;
-webkit-user-select:none;
-webkit-tap-highlight-color:transparent;
}

body{
overflow:hidden;
font-family:sans-serif;
}

/* 🌄 BAKGRUND */
#sky{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(#87ceeb,#e0f7ff);
z-index:-3;
}

#mountains{
position:fixed;
bottom:0;
width:100%;
height:50%;
background:linear-gradient(#6ab04c,#2ecc71);
clip-path:polygon(0% 100%, 10% 60%, 20% 100%, 35% 50%, 50% 100%, 65% 60%, 80% 100%, 100% 70%, 100% 100%);
z-index:-2;
opacity:0.4;
}

#game{
position:relative;
height:65vh;
overflow:hidden;
}

#world{
position:absolute;
bottom:0;
left:0;
height:100%;
width:6000px;
}

/* 🟢 MARK */
#ground{
position:absolute;
bottom:0;
height:80px;
width:100%;
background:linear-gradient(#2ecc71,#27ae60);
}

/* 🌊 vatten */
.water{
position:absolute;
bottom:0;
height:80px;
background:linear-gradient(#3498db,#2c80b4);
}

/* 🔥 lava */
.lava{
position:absolute;
bottom:0;
height:80px;
background:linear-gradient(#ff3c00,#ff9a00,#ff3c00);
animation:lavaFlow 1s linear infinite;
}

@keyframes lavaFlow{
0%{filter:hue-rotate(0deg)}
100%{filter:hue-rotate(20deg)}
}

/* 🏝️ ö */
.island{
position:absolute;
bottom:80px;
width:140px;
height:40px;
background:linear-gradient(#ffe066,#f1c40f);
border-radius:20px;
box-shadow:0 5px 0 #d4ac0d;
}

/* 🌴 träd */
.palm{
position:absolute;
font-size:140px;
}

/* 🌄 kulle */
.hill{
position:absolute;
bottom:80px;
height:120px;
width:200px;
background:linear-gradient(#6be585,#2ecc71,#1e9e5a);
border-radius:80px 80px 0 0;
box-shadow:inset 0 -10px rgba(0,0,0,0.1);
}

/* 🟣 båt */
#boat{
position:absolute;
width:140px;
height:70px;
bottom:110px;
background:url("67.jpg") center/contain no-repeat;
}

/* 🏁 mål */
#goal{
position:absolute;
font-size:80px;
bottom:80px;
}

/* ⭐ UI */
#ui{
position:absolute;
top:10px;
left:10px;
font-size:22px;
background:rgba(255,255,255,0.6);
padding:6px 10px;
border-radius:10px;
}

/* 🧍 spelare */
#player{
position:absolute;
left:40%;
bottom:80px;
width:160px;
height:160px;
display:flex;
align-items:flex-end;
}

#playerSprite{
width:100%;
height:100%;
background:url("player-idle.PNG") center bottom no-repeat;
background-size:contain;
transform:translateY(20px);
}

/* 🐕 hund */
#dog{
position:absolute;
width:60px;
height:60px;
}

#dog img{
width:100%;
height:100%;
object-fit:contain;
transform:translateY(10px);
}

/* 🎮 kontroller */
#controls{
display:flex;
justify-content:center;
gap:20px;
background:#1c2e4a;
padding:10px;
}

button{
font-size:28px;
padding:12px 18px;
border-radius:10px;
background:#2f4b7c;
color:white;
border:none;
}
</style>
</head>

<body>

<div id="sky"></div>
<div id="mountains"></div>

<div id="game">

<div id="ui">⭐ 0</div>

<div id="world">

<div id="ground"></div>

<div class="hill" style="left:400px;"></div>

<div class="water" style="left:700px;width:300px;"></div>

<div class="island" style="left:760px;"></div>
<div class="island" style="left:880px;"></div>

<div class="palm" style="left:720px;bottom:80px;">🌴</div>
<div class="palm" style="left:860px;bottom:80px;">🌴</div>

<div class="lava" style="left:1100px;width:300px;"></div>

<div id="boat"></div>

<div id="goal" style="left:1500px;">🏁</div>

</div>

<div id="player"><div id="playerSprite"></div></div>
<div id="dog"><img src="dog-sit.png"></div>

</div>

<div id="controls">
<button id="left">⬅️</button>
<button id="jump">⬆️</button>
<button id="right">➡️</button>
</div>

<script>

/* samma JS som fungerade innan – INGEN förändring */
/* (vi rör inte logiken för att inte förstöra stabiliteten) */

</script>

</body>
</html>

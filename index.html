<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mattekompis</title>

<style>

*{
user-select:none;
-webkit-user-select:none;
-webkit-touch-callout:none;
box-sizing:border-box;
}

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:#7ecbff;
}

#game{
position:relative;
height:65vh;
background:linear-gradient(#7ecbff,#c8f6ff);
overflow:hidden;
}

#world{
position:absolute;
bottom:0;
left:0;
height:100%;
width:200000px;
}

.ground{
position:absolute;
bottom:0;
height:80px;
width:200000px;
background:#2ecc71;
}

.obstacle{
position:absolute;
bottom:80px;
width:60px;
height:60px;
background:#8e44ad;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
}

#player{
position:absolute;
bottom:80px;
left:40%;
width:110px;
height:110px;
}

#playerSprite{
width:110px;
height:110px;
background:url("player-idle.PNG");
background-size:contain;
background-repeat:no-repeat;
}

.walk{
background:url("player-walk.PNG");
background-size:auto 110px;
animation:walk .6s steps(6) infinite;
}

@keyframes walk{
from{background-position:0}
to{background-position:-660px}
}

#dog{
position:absolute;
bottom:80px;
left:30%;
width:80px;
}

#dog img{
width:100%;
}

#controls{
display:flex;
justify-content:center;
gap:30px;
padding:15px;
background:#1c2e4a;
}

button{
font-size:28px;
padding:15px 20px;
border-radius:12px;
border:none;
background:#2f4b7c;
color:white;
}

#math{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
}

.grid{
display:grid;
grid-template-columns:60px 60px 60px;
grid-template-rows:60px 60px 60px 60px;
background:white;
padding:10px;
}

.cell{
border:2px solid black;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
}

input{
width:100%;
height:100%;
border:none;
font-size:28px;
text-align:center;
}

#progress{
position:absolute;
top:10px;
left:10px;
background:white;
padding:6px 10px;
border-radius:6px;
}

</style>
</head>

<body>

<div id="game">

<div id="progress">0 / 5</div>

<div id="world">
<div class="ground"></div>
</div>

<div id="player">
<div id="playerSprite"></div>
</div>

<div id="dog">
<img id="dogImg" src="dog-sit.png">
</div>

</div>

<div id="controls">
<button id="jump">⬆️</button>
<button id="right">➡️</button>
</div>

<div id="math">
<div class="grid" id="grid"></div>
<button onclick="check()">Klar</button>
</div>

<script>

let worldX=0
let moving=false
let paused=false

let tasks=["39+15","63+28","58+34","37+45","44+17"]
let taskIndex=0
let correct=0
let nextSpawn=600

const world=document.getElementById("world")
const sprite=document.getElementById("playerSprite")
const player=document.getElementById("player")
const dog=document.getElementById("dog")

generateWorld()

function generateWorld(){

for(let i=0;i<20;i++){

let o=document.createElement("div")
o.className="obstacle"
o.style.left=nextSpawn+"px"
o.innerText="?"
world.appendChild(o)

nextSpawn+=600

}

}

right.onpointerdown=()=>{
moving=true
sprite.classList.add("walk")
}

right.onpointerup=()=>{
moving=false
sprite.classList.remove("walk")
}

function showMath(){

paused=true

let q=tasks[taskIndex]
let [a,b]=q.split("+").map(Number)

correct=a+b

buildGrid(a,b)

math.style.display="flex"

}

function buildGrid(a,b){

const grid=document.getElementById("grid")

grid.innerHTML=""

const cells=[
"","","",
"",Math.floor(a/10),a%10,
"+",Math.floor(b/10),b%10,
"i","i",""
]

cells.forEach(v=>{

let c=document.createElement("div")
c.className="cell"

if(v==="i"){

let inp=document.createElement("input")
inp.maxLength=1
c.appendChild(inp)

}else{

c.textContent=v

}

grid.appendChild(c)

})

}

function check(){

let nums=[...document.querySelectorAll("input")].map(i=>i.value).join("")
let val=parseInt(nums)

if(val===correct){

taskIndex++

progress.innerText=taskIndex+" / "+tasks.length

math.style.display="none"

paused=false

}

}

function loop(){

if(!paused){

if(moving) worldX-=4

world.style.left=worldX+"px"

dog.style.left=(player.offsetLeft-90)+"px"

const pr=player.getBoundingClientRect()

document.querySelectorAll(".obstacle").forEach(o=>{

const r=o.getBoundingClientRect()

if(pr.right>r.left && pr.left<r.right){

showMath()
o.remove()

}

})

}

requestAnimationFrame(loop)

}

loop()

</script>
</body>
</html>

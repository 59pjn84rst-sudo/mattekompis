<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mattekompis</title>

<style>
*{margin:0;box-sizing:border-box;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}

body{overflow:hidden;font-family:sans-serif;}

/* 🌄 bakgrund */
#sky{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(#87ceeb,#e0f7ff);
z-index:-2;
}

#game{position:relative;height:65vh;overflow:hidden;}
#world{position:absolute;bottom:0;left:0;height:100%;width:6000px;}

/* mark */
#ground{
position:absolute;
bottom:0;
height:80px;
width:100%;
background:linear-gradient(#2ecc71,#27ae60);
}

/* vatten */
.water{
position:absolute;
bottom:0;
height:80px;
background:#3498db;
}

/* lava */
.lava{
position:absolute;
bottom:0;
height:80px;
background:linear-gradient(#ff3c00,#ff9a00);
}

/* ö */
.island{
position:absolute;
bottom:80px;
width:140px;
height:40px;
background:#ffe066;
border-radius:20px;
}

/* kulle */
.hill{
position:absolute;
bottom:80px;
height:120px;
width:200px;
background:#2ecc71;
border-radius:80px 80px 0 0;
}

/* båt */
#boat{
position:absolute;
width:120px;
height:60px;
bottom:110px;
background:url("67.jpg") center/contain no-repeat;
}

/* mål */
#goal{
position:absolute;
font-size:80px;
bottom:80px;
}

/* UI */
#ui{
position:absolute;
top:10px;
left:10px;
font-size:20px;
background:rgba(255,255,255,0.7);
padding:6px 10px;
border-radius:10px;
}

/* spelare */
#player{
position:absolute;
left:40%;
bottom:80px;
width:160px;
height:160px;
display:flex;
align-items:flex-end;
}

#playerSprite{
width:100%;
height:100%;
background:url("player-idle.PNG") center bottom no-repeat;
background-size:contain;
transform:translateY(20px);
}

/* hund */
#dog{
position:absolute;
width:60px;
height:60px;
}

#dog img{
width:100%;
height:100%;
object-fit:contain;
transform:translateY(10px);
}

/* kontroller */
#controls{
display:flex;
justify-content:center;
gap:20px;
background:#1c2e4a;
padding:10px;
}

button{
font-size:28px;
padding:12px 18px;
border-radius:10px;
background:#2f4b7c;
color:white;
border:none;
}
</style>
</head>

<body>

<div id="sky"></div>

<div id="game">

<div id="ui">⭐ 0</div>

<div id="world">

<div id="ground"></div>

<div class="hill" style="left:400px;"></div>

<div class="water" style="left:700px;width:300px;"></div>

<div class="island" style="left:760px;"></div>
<div class="island" style="left:880px;"></div>

<div class="lava" style="left:1100px;width:300px;"></div>

<div id="boat"></div>

<div id="goal" style="left:1500px;">🏁</div>

</div>

<div id="player"><div id="playerSprite"></div></div>
<div id="dog"><img src="dog-sit.png"></div>

</div>

<div id="controls">
<button id="left">⬅️</button>
<button id="jump">⬆️</button>
<button id="right">➡️</button>
</div>

<script>

/* ===== STATE ===== */
let vx=0,vy=0,move=0,onGround=true,worldX=0
let score=0

const player=document.getElementById("player")
const dog=document.getElementById("dog")
const world=document.getElementById("world")
const ui=document.getElementById("ui")
const boat=document.getElementById("boat")

const hill={x:400,w:200,h:120}
const islands=[{x:760,w:140},{x:880,w:140}]
const water={x:700,w:300}
const lava={x:1100,w:300}
const goalX=1500

let boatX=1150
let boatDir=1

/* INPUT */
function stop(){move=0}
function leftPress(){move=-1}
function rightPress(){move=1}

left.addEventListener("touchstart",leftPress)
left.addEventListener("mousedown",leftPress)
right.addEventListener("touchstart",rightPress)
right.addEventListener("mousedown",rightPress)

left.addEventListener("touchend",stop)
right.addEventListener("touchend",stop)
left.addEventListener("mouseup",stop)
right.addEventListener("mouseup",stop)

window.addEventListener("mouseup",stop)
window.addEventListener("touchend",stop)

/* hopp */
function jumpNow(){
vy=14
onGround=false
score+=10
ui.innerText="⭐ "+score
}

jump.addEventListener("touchstart",jumpNow)
jump.addEventListener("mousedown",jumpNow)

/* LOOP */
function loop(){

let px=-worldX+player.offsetLeft+player.offsetWidth*0.4
let bottom=parseFloat(player.style.bottom||80)

vx=move*5

/* kulle */
if(px>390&&px<400&&bottom<=82&&vx>0){vx=0}
if(px>400&&px<600&&vy<0&&bottom>190){
bottom=200;vy=0;onGround=true
}

/* öar */
let onIsland=false
for(let i of islands){
if(px>i.x&&px<i.x+i.w&&vy<0&&bottom>=105){
bottom=120;vy=0;onGround=true;onIsland=true
}
}

/* båt */
let onBoat=false
if(px>boatX&&px<boatX+120&&vy<0&&bottom>=120){
bottom=130;vy=0;onGround=true;onBoat=true
worldX-=boatDir*2
}

/* mål */
if(px>goalX){
alert("🎉 Klar!")
location.reload()
}

/* world */
worldX-=vx
world.style.left=worldX+"px"

/* båt */
boatX+=boatDir*2
if(boatX<1100||boatX>1300)boatDir*=-1
boat.style.left=boatX+"px"

/* gravity */
vy-=0.7
bottom+=vy

/* mark */
if(!(px>water.x&&px<water.x+water.w)&&
   !(px>lava.x&&px<lava.x+lava.w)&&
   !onIsland&&!onBoat){
if(bottom<=80){
bottom=80;vy=0;onGround=true
}
}

/* apply */
player.style.bottom=bottom+"px"
dog.style.left=(player.offsetLeft-60)+"px"
dog.style.bottom=bottom+"px"

requestAnimationFrame(loop)
}

loop()

</script>

</body>
</html>

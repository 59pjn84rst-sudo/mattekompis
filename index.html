<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mattekompis v27</title>

<style>

*{margin:0;box-sizing:border-box;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}

body{overflow:hidden;background:linear-gradient(#7ecbff,#c8f6ff);}

/* SPEL */

#game{position:relative;height:65vh;overflow:hidden;}
#world{position:absolute;bottom:0;left:0;height:100%;width:50000px;}

/* SPELARE */

#player{position:absolute;left:40%;bottom:80px;width:160px;height:160px;z-index:5;}
#playerSprite{width:100%;height:100%;background:url("player-idle.PNG") center/contain no-repeat;}

.walk{
background:url("player-walk.PNG") left center;
background-size:auto 160px;
animation:walk .6s steps(6) infinite;
}

@keyframes walk{
from{background-position:0}
to{background-position:-960px}
}

/* HUND */

#dog{position:absolute;width:60px;height:60px;z-index:4;}
#dog img{width:100%;height:100%;object-fit:contain;}

/* 67 */

#enemy{
position:absolute;
bottom:80px;
font-size:80px;
z-index:3;
}

/* TERRÄNG */

.segment{position:absolute}

.ground{background:#2ecc71;height:80px;}
.hill{background:linear-gradient(#2ecc71,#27ae60);height:80px;}
.water{background:#3498db;height:80px;}
.hole{background:transparent;height:80px;}
.lava{
background:linear-gradient(#ff3c00,#ff9a00);
height:80px;
}

/* KONTROLLER */

#controls{
display:flex;justify-content:center;gap:20px;
background:#1c2e4a;padding:10px;
}

button{
font-size:28px;padding:12px 18px;border:none;
border-radius:10px;background:#2f4b7c;color:white;
}

</style>
</head>

<body>

<div id="game">
<div id="world"></div>

<div id="player"><div id="playerSprite"></div></div>
<div id="dog"><img id="dogImg" src="dog-sit.png"></div>
<div id="enemy">67</div>

</div>

<div id="controls">
<button id="left">⬅️</button>
<button id="jump">⬆️</button>
<button id="right">➡️</button>
</div>

<script>

/* STATE */

let worldX=0, vx=0, vy=0
let move=0, onGround=true

const player=document.getElementById("player")
const dog=document.getElementById("dog")
const dogImg=document.getElementById("dogImg")
const sprite=document.getElementById("playerSprite")
const world=document.getElementById("world")
const enemy=document.getElementById("enemy")

let segments=[]

/* GENERERA BANA */

let x=0

// säker start
for(let i=0;i<5;i++){
createGround(300)
x+=320
}

for(let i=0;i<60;i++){

let r=Math.random()

if(r<0.4) createGround(250)
else if(r<0.6) createHill(250)
else if(r<0.75) createWater(250)
else if(r<0.9) createHole(180)
else createLava(200)

x+=300

}

/* SKAPA */

function createGround(w){
segments.push({type:"ground",x:x,width:w})

let d=document.createElement("div")
d.className="segment ground"
d.style.left=x+"px"
d.style.width=w+"px"
d.style.bottom="0"
world.appendChild(d)
}

function createHill(w){
segments.push({type:"hill",x:x,width:w})

let d=document.createElement("div")
d.className="segment hill"
d.style.left=x+"px"
d.style.width=w+"px"
d.style.bottom="80px"
d.style.borderRadius="50% 50% 0 0"
world.appendChild(d)
}

function createWater(w){
segments.push({type:"water",x:x,width:w})

let d=document.createElement("div")
d.className="segment water"
d.style.left=x+"px"
d.style.width=w+"px"
d.style.bottom="0"
world.appendChild(d)
}

function createHole(w){
segments.push({type:"hole",x:x,width:w})
}

function createLava(w){
segments.push({type:"lava",x:x,width:w})

let d=document.createElement("div")
d.className="segment lava"
d.style.left=x+"px"
d.style.width=w+"px"
d.style.bottom="0"
world.appendChild(d)
}

/* INPUT */

function stop(){move=0}

right.onpointerdown=()=>move=1
left.onpointerdown=()=>move=-1

right.onpointerup=stop
left.onpointerup=stop

window.addEventListener("pointerup",stop)
window.addEventListener("touchend",stop)

jump.onpointerdown=()=>{
if(onGround){
vy=14
onGround=false
}
}

/* MARK */

function getGround(px){

for(let s of segments){

if(px>=s.x && px<=s.x+s.width){

if(s.type==="ground") return 80

if(s.type==="hill"){
let t=(px-s.x)/s.width
return 80 + 60*Math.sin(t*Math.PI)
}

if(s.type==="water" || s.type==="hole") return null

if(s.type==="lava") return "lava"

}
}

return 80
}

/* LOOP */

let enemyX=2000

function loop(){

/* rörelse */
vx += (move*5 - vx)*0.2
worldX -= vx

/* animation */
if(Math.abs(vx)>0.5){
sprite.classList.add("walk")
dogImg.src="dog-walk.png"
}else{
sprite.classList.remove("walk")
dogImg.src="dog-sit.png"
}

/* gravity */
vy -= 0.7

let px=-worldX + window.innerWidth*0.4
let ground=getGround(px)

let bottom=parseFloat(player.style.bottom||80)

/* lava */
if(ground==="lava"){
bottom=80
vy=0
worldX=0 // reset
}

/* normal */
else if(ground===null){
bottom += vy
onGround=false
}else{
if(bottom<=ground){
bottom=ground
vy=0
onGround=true
}
}

/* apply */
player.style.bottom=bottom+"px"
world.style.left=worldX+"px"

/* dog */
dog.style.left=(player.offsetLeft-60)+"px"
dog.style.bottom=bottom+"px"

if(!onGround){
dog.style.transform="translateY(-15px)"
}else{
dog.style.transform="translateY(0)"
}

/* 67 enemy */
enemyX -= 2
if(enemyX < worldX-500){
enemyX = worldX + window.innerWidth + 500
}

enemy.style.left = enemyX + "px"

requestAnimationFrame(loop)

}

loop()

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mattekompis v24</title>

<style>

*{
margin:0;
box-sizing:border-box;
user-select:none;
-webkit-user-select:none;
-webkit-tap-highlight-color:transparent;
}

body{
overflow:hidden;
background:linear-gradient(#7ecbff,#c8f6ff);
font-family:sans-serif;
}

/* SPEL */

#game{
position:relative;
height:65vh;
overflow:hidden;
}

#world{
position:absolute;
bottom:0;
left:0;
height:100%;
width:200000px;
}

/* SPELARE */

#player{
position:absolute;
left:40%;
bottom:80px;
width:82px;
height:82px;
z-index:5;
}

#playerSprite{
width:100%;
height:100%;
background:url("player-idle.PNG") center/contain no-repeat;
}

.walk{
background:url("player-walk.PNG");
background-size:auto 82px;
animation:walk .6s steps(6) infinite;
}

@keyframes walk{
from{background-position:0}
to{background-position:-492px}
}

/* HUND */

#dog{
position:absolute;
width:30px;
height:30px;
z-index:4;
}

#dog img{
width:100%;
height:100%;
object-fit:contain;
}

/* TERRÄNG */

.segment{position:absolute}

.ground{background:#2ecc71;}

.hill{
background:linear-gradient(#2ecc71,#27ae60);
}

.water{
background:#3498db;
}

/* BÅT */

.boat{
position:absolute;
bottom:80px;
font-size:40px;
transform:scale(2);
}

/* TRÄD */

.tree,.palm{
position:absolute;
font-size:60px;
z-index:2;
}

/* DINO */

.dino{
position:absolute;
font-size:50px;
z-index:1;
}

/* KONTROLLER */

#controls{
display:flex;
justify-content:center;
gap:20px;
background:#1c2e4a;
padding:10px;
}

button{
font-size:28px;
padding:12px 18px;
border:none;
border-radius:10px;
background:#2f4b7c;
color:white;
touch-action:manipulation;
}

</style>
</head>

<body>

<div id="game">
<div id="world"></div>

<div id="player"><div id="playerSprite"></div></div>
<div id="dog"><img id="dogImg" src="dog-sit.png"></div>
</div>

<div id="controls">
<button id="left">⬅️</button>
<button id="jump">⬆️</button>
<button id="right">➡️</button>
</div>

<script>

/* STATE */

let worldX=0
let velocity=0
let vy=0
let onGround=true

let moveInput=0
let onBoat=null

let lastPx=0

const world=document.getElementById("world")
const player=document.getElementById("player")
const dog=document.getElementById("dog")
const dogImg=document.getElementById("dogImg")
const sprite=document.getElementById("playerSprite")

let segments=[]
let boats=[]

/* GENERATE */

let x=0

for(let i=0;i<80;i++){

let r=Math.random()

if(r<0.5) createGround(220)
else if(r<0.75) createHill(220)
else createWater(300)

spawnDecor(x)

x+=260

}

function createGround(w){

segments.push({type:"ground",x:x,width:w})

let d=document.createElement("div")
d.className="segment ground"
d.style.left=x+"px"
d.style.width=w+"px"
d.style.height="80px"
d.style.bottom="0"
world.appendChild(d)
}

function createHill(w){

segments.push({type:"hill",x:x,width:w})

let base=document.createElement("div")
base.className="segment ground"
base.style.left=x+"px"
base.style.width=w+"px"
base.style.height="80px"
base.style.bottom="0"
world.appendChild(base)

let d=document.createElement("div")
d.className="segment hill"
d.style.left=x+"px"
d.style.width=w+"px"
d.style.height="80px"
d.style.bottom="80px"
d.style.borderRadius="50% 50% 0 0"
world.appendChild(d)
}

function createWater(w){

segments.push({type:"water",x:x,width:w})

let d=document.createElement("div")
d.className="segment water"
d.style.left=x+"px"
d.style.width=w+"px"
d.style.height="80px"
d.style.bottom="0"
world.appendChild(d)

/* boat */

let bx=x+w/2-80

let b=document.createElement("div")
b.className="boat"
b.innerText="⛵"
b.style.left=bx+"px"
world.appendChild(b)

boats.push({x:bx,width:160,speed:1.2})
}

/* DECOR */

function spawnDecor(px){

let hasTree=false

if(Math.random()<0.25){

hasTree=true

let count=2+Math.floor(Math.random()*2)

for(let i=0;i<count;i++){

let el=document.createElement("div")

if(Math.random()<0.8){
el.className="palm"
el.innerText="🌴"
}else{
el.className="tree"
el.innerText="🌳"
}

el.style.left=(px+i*40)+"px"
el.style.bottom="80px"

world.appendChild(el)
}
}

if(!hasTree && Math.random()<0.3){

let d=document.createElement("div")
d.className="dino"
d.innerText=Math.random()<0.5?"🦖":"🦕"
d.style.left=(px+60)+"px"
d.style.bottom="80px"
world.appendChild(d)
}
}

/* INPUT */

function stopMove(){ moveInput=0 }

right.onpointerdown=()=>moveInput=1
left.onpointerdown=()=>moveInput=-1

right.onpointerup=stopMove
left.onpointerup=stopMove

window.addEventListener("pointerup",stopMove)
window.addEventListener("touchend",stopMove)

jump.onpointerdown=()=>{
if(onGround){
vy=12
onGround=false
}
}

/* TERRAIN HEIGHT */

function getGround(px){

onBoat=null

for(let b of boats){
if(px>=b.x && px<=b.x+b.width){
onBoat=b
return {type:"boat", y:80, speed:b.speed}
}
}

for(let s of segments){

if(px>=s.x && px<=s.x+s.width){

if(s.type==="ground") return {type:"ground",y:80}

if(s.type==="hill"){
let t=(px-s.x)/s.width
let height=60*Math.sin(t*Math.PI)
return {type:"hill",y:80+height}
}

if(s.type==="water") return null
}
}

return {type:"ground",y:80}
}

/* LOOP */

function loop(){

/* acceleration */
let targetSpeed = moveInput * 4
velocity += (targetSpeed - velocity) * 0.2

worldX -= velocity

/* animation */
if(Math.abs(velocity)>0.2){
sprite.classList.add("walk")
dogImg.src="dog-walk.png"
}else{
sprite.classList.remove("walk")
dogImg.src="dog-sit.png"
}

/* gravity */
vy -= 0.6

let px=-worldX + window.innerWidth*0.4
let ground=getGround(px)

let bottom=parseFloat(player.style.bottom||80)

if(ground===null){
bottom += vy
onGround=false
}else{
bottom = ground.y
vy=0
onGround=true

if(ground.type==="boat"){
worldX -= ground.speed
}
}

/* apply */
player.style.bottom=bottom+"px"

/* dog follow */
dog.style.left=(player.offsetLeft-30)+"px"
dog.style.bottom=bottom+"px"

if(!onGround){
dog.style.transform="translateY(-10px)"
}else{
dog.style.transform="translateY(0)"
}

/* smooth camera */
world.style.left += (worldX - parseFloat(world.style.left||0)) * 0.2 + "px"

requestAnimationFrame(loop)

}

loop()

</script>
</body>
</html>

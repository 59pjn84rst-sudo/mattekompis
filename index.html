<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mattekompis</title>

<style>

*{
user-select:none;
-webkit-user-select:none;
-webkit-touch-callout:none;
box-sizing:border-box;
}

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:#7ecbff;
}

button{
-webkit-tap-highlight-color:transparent;
touch-action:manipulation;
}

#start{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:#7ecbff;
gap:20px;
}

#game{
position:relative;
height:60vh;
background:linear-gradient(#7ecbff,#c8f6ff);
overflow:hidden;
}

#world{
position:absolute;
bottom:0;
left:0;
height:100%;
width:200000px;
}

.ground{
position:absolute;
bottom:0;
height:80px;
width:200000px;
background:#2ecc71;
}

.tree{position:absolute;bottom:80px;font-size:40px}
.flower{position:absolute;bottom:80px;font-size:24px}

.hill{
position:absolute;
bottom:80px;
width:200px;
height:100px;
background:#27ae60;
border-radius:200px 200px 0 0;
}

.obstacle{
position:absolute;
bottom:80px;
width:60px;
height:60px;
background:#8e44ad;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
}

#player{
position:absolute;
bottom:80px;
left:40%;
width:120px;
height:120px;
}

#playerSprite{
width:120px;
height:120px;
background:url("player-idle.PNG");
background-size:contain;
background-repeat:no-repeat;
}

.walk{
background:url("player-walk.PNG");
background-size:auto 120px;
animation:walk .6s steps(6) infinite;
}

@keyframes walk{
from{background-position:0}
to{background-position:-720px}
}

#dog{
position:absolute;
bottom:80px;
left:30%;
width:80px;
}

#dog img{
width:100%;
}

#controls{
display:flex;
justify-content:center;
gap:30px;
padding:15px;
background:#1c2e4a;
}

button{
font-size:30px;
padding:15px 20px;
border-radius:12px;
border:none;
background:#2f4b7c;
color:white;
}

#math{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
}

#mathBox{
background:white;
padding:25px;
border-radius:10px;
text-align:center;
}

input{
font-size:28px;
width:120px;
text-align:center;
}

#progress{
position:absolute;
top:10px;
left:10px;
background:white;
padding:6px 10px;
border-radius:6px;
}

</style>
</head>

<body>

<div id="start">

<h1>Mattekompis</h1>
<button onclick="startGame()">Starta</button>

</div>

<div id="game">

<div id="progress">0 / 5</div>

<div id="world">

<div class="ground"></div>

</div>

<div id="player">
<div id="playerSprite"></div>
</div>

<div id="dog">
<img id="dogImg" src="dog-sit.png">
</div>

</div>

<div id="controls">

<button id="left">⬅️</button>
<button id="jump">⬆️</button>
<button id="right">➡️</button>

</div>

<div id="math">

<div id="mathBox">

<h2 id="question"></h2>

<input id="answer">

<br><br>

<button onclick="check()">Klar</button>

</div>

</div>

<audio id="correctSound" src="Correct.mp3"></audio>

<script>

let worldX=0
let moving=false
let vy=0
let onGround=true
let paused=false

let tasks=["39+15","63+28","58+34","37+45","44+17"]

let taskIndex=0
let correct=0

let nextSpawn=800
let finished=false

const world=document.getElementById("world")
const sprite=document.getElementById("playerSprite")
const player=document.getElementById("player")
const dog=document.getElementById("dog")
const dogImg=document.getElementById("dogImg")

function startGame(){

document.getElementById("start").style.display="none"

generateWorld()

}

function generateWorld(){

for(let i=0;i<30;i++){

spawnDecoration()
spawnObstacle()

}

}

function spawnDecoration(){

let x=nextSpawn+Math.random()*300
let r=Math.random()

if(r<0.33){

let t=document.createElement("div")
t.className="tree"
t.style.left=x+"px"
t.innerText="🌳"
world.appendChild(t)

}else if(r<0.66){

let f=document.createElement("div")
f.className="flower"
f.style.left=x+"px"
f.innerText="🌼"
world.appendChild(f)

}else{

let h=document.createElement("div")
h.className="hill"
h.style.left=x+"px"
world.appendChild(h)

}

}

function spawnObstacle(){

let o=document.createElement("div")
o.className="obstacle"
o.style.left=nextSpawn+"px"
o.innerText="?"
world.appendChild(o)

nextSpawn+=600

}

right.onpointerdown=()=>{
moving=true
sprite.classList.add("walk")
dogImg.src="dog-walk.png"
}

right.onpointerup=()=>{
moving=false
sprite.classList.remove("walk")
dogImg.src="dog-sit.png"
}

jump.onpointerdown=()=>{
if(onGround){
vy=12
onGround=false
}
}

function showMath(){

if(taskIndex>=tasks.length || finished) return

paused=true

let q=tasks[taskIndex]

let p=q.split("+")
correct=parseInt(p[0])+parseInt(p[1])

question.innerText=q

math.style.display="flex"

answer.focus()

}

function check(){

let v=parseInt(answer.value)

if(v===correct){

correctSound.play()

taskIndex++

progress.innerText=taskIndex+" / "+tasks.length

answer.value=""

math.style.display="none"

paused=false

if(taskIndex>=tasks.length){

finished=true
spawnFlag()

}

}

}

function spawnFlag(){

let flag=document.createElement("div")

flag.style.position="absolute"
flag.style.left=(nextSpawn+200)+"px"
flag.style.bottom="80px"
flag.style.fontSize="70px"

flag.innerText="🏁"

world.appendChild(flag)

fireworks()

}

function fireworks(){

for(let i=0;i<25;i++){

let star=document.createElement("div")

star.innerText="✨"
star.style.position="absolute"
star.style.left=(window.innerWidth/2 + Math.random()*300-150)+"px"
star.style.top=(window.innerHeight/2 + Math.random()*200-100)+"px"

document.body.appendChild(star)

setTimeout(()=>star.remove(),800)

}

}

function loop(){

if(!paused){

if(moving) worldX-=4

vy-=0.6

let bottom=parseFloat(player.style.bottom||80)
bottom+=vy

if(bottom<=80){
bottom=80
vy=0
onGround=true
}

player.style.bottom=bottom+"px"

dog.style.left=(player.offsetLeft-100)+"px"

world.style.left=worldX+"px"

if(-worldX+window.innerWidth>nextSpawn-1000){

spawnDecoration()

if(!finished) spawnObstacle()

}

const pr=player.getBoundingClientRect()

document.querySelectorAll(".obstacle").forEach(o=>{

const r=o.getBoundingClientRect()

if(pr.right>r.left && pr.left<r.right){

showMath()
o.remove()

}

})

}

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>

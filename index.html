<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mattekompis</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

*{
user-select:none;
-webkit-user-select:none;
-webkit-touch-callout:none;
box-sizing:border-box;
}

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:#7ecbff;
}

#game{
position:relative;
height:65vh;
background:linear-gradient(#7ecbff,#c8f6ff);
overflow:hidden;
}

#world{
position:absolute;
bottom:0;
left:0;
height:100%;
width:200000px;
}

.ground{
position:absolute;
bottom:0;
height:80px;
width:200000px;
background:#2ecc71;
}

.tree{position:absolute;bottom:80px;font-size:40px}
.flower{position:absolute;bottom:80px;font-size:24px}

.hill{
position:absolute;
bottom:80px;
width:200px;
height:120px;
background:#27ae60;
border-radius:200px 200px 0 0;
}

.obstacle{
position:absolute;
bottom:80px;
width:60px;
height:60px;
background:#8e44ad;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
}

#player{
position:absolute;
bottom:80px;
left:40%;
width:110px;
height:110px;
}

#playerSprite{
width:110px;
height:110px;
background:url("player-idle.PNG");
background-size:contain;
background-repeat:no-repeat;
}

.walk{
background:url("player-walk.PNG");
background-size:auto 110px;
animation:walk .6s steps(6) infinite;
}

@keyframes walk{
from{background-position:0}
to{background-position:-660px}
}

#dog{
position:absolute;
bottom:80px;
left:30%;
width:80px;
}

#dog img{width:100%}

#controls{
display:flex;
justify-content:center;
gap:30px;
padding:15px;
background:#1c2e4a;
}

button{
font-size:28px;
padding:15px 20px;
border-radius:12px;
border:none;
background:#2f4b7c;
color:white;
}

#math{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
}

.grid{
display:grid;
grid-template-columns:60px 60px 60px;
grid-template-rows:60px 60px 60px 60px;
background:white;
padding:10px;
}

.cell{
border:2px solid black;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
}

input{
width:100%;
height:100%;
border:none;
font-size:28px;
text-align:center;
}

#progress{
position:absolute;
top:10px;
left:10px;
background:white;
padding:6px 10px;
border-radius:6px;
}

#photo{
position:absolute;
top:10px;
right:10px;
background:white;
padding:6px;
}

</style>
</head>

<body>

<div id="game">

<div id="progress">0 / 5</div>

<input type="file" id="photo" accept="image/*">

<div id="world">
<div class="ground"></div>
</div>

<div id="player">
<div id="playerSprite"></div>
</div>

<div id="dog">
<img id="dogImg" src="dog-sit.png">
</div>

</div>

<div id="controls">
<button id="left">⬅️</button>
<button id="jump">⬆️</button>
<button id="right">➡️</button>
</div>

<div id="math">
<div class="grid" id="grid"></div>
<button onclick="check()">Klar</button>
</div>

<audio id="correctSound" src="Correct.mp3"></audio>

<script>

let worldX=0
let moving=false
let vy=0
let onGround=true
let paused=false

let tasks=["39+15","63+28","58+34","37+45","44+17"]

let taskIndex=0
let correct=0

let nextSpawn=800
let finished=false

const world=document.getElementById("world")
const sprite=document.getElementById("playerSprite")
const player=document.getElementById("player")
const dog=document.getElementById("dog")
const dogImg=document.getElementById("dogImg")

generateWorld()

function generateWorld(){

for(let i=0;i<30;i++){

spawnDecoration()
spawnObstacle()

}

}

function spawnDecoration(){

let x=nextSpawn+Math.random()*300
let r=Math.random()

if(r<0.33){

let t=document.createElement("div")
t.className="tree"
t.style.left=x+"px"
t.innerText="🌳"
world.appendChild(t)

}else if(r<0.66){

let f=document.createElement("div")
f.className="flower"
f.style.left=x+"px"
f.innerText="🌼"
world.appendChild(f)

}else{

let h=document.createElement("div")
h.className="hill"
h.style.left=x+"px"
world.appendChild(h)

}

}

function spawnObstacle(){

let o=document.createElement("div")
o.className="obstacle"
o.style.left=nextSpawn+"px"
o.innerText="?"
world.appendChild(o)

nextSpawn+=600

}

right.onpointerdown=()=>{
moving=true
sprite.classList.add("walk")
dogImg.src="dog-walk.png"
}

right.onpointerup=()=>{
moving=false
sprite.classList.remove("walk")
dogImg.src="dog-sit.png"
}

jump.onpointerdown=()=>{
if(onGround){
vy=12
onGround=false
}
}

function showMath(){

if(taskIndex>=tasks.length || finished) return

paused=true

let q=tasks[taskIndex]

let [a,b]=q.split("+").map(Number)

correct=a+b

buildGrid(a,b)

math.style.display="flex"

}

function buildGrid(a,b){

const grid=document.getElementById("grid")

grid.innerHTML=""

const cells=[
"",Math.floor(a/10),a%10,
"+",Math.floor(b/10),b%10,
"","","",
"i","i",""
]

cells.forEach(v=>{

let c=document.createElement("div")
c.className="cell"

if(v==="i"){

let inp=document.createElement("input")
inp.maxLength=1
c.appendChild(inp)

}else{

c.textContent=v

}

grid.appendChild(c)

})

}

function check(){

let nums=[...document.querySelectorAll("input")].map(i=>i.value).join("")

let val=parseInt(nums)

if(val===correct){

correctSound.play()

dogJump()

taskIndex++

progress.innerText=taskIndex+" / "+tasks.length

math.style.display="none"

paused=false

if(taskIndex>=tasks.length){

finished=true
spawnFlag()

}

}

}

function dogJump(){

dog.style.transition="transform .2s"

dog.style.transform="translateY(-20px)"

setTimeout(()=>{
dog.style.transform="translateY(0px)"
},200)

let text=document.createElement("div")

text.innerText="Voff!"

text.style.position="absolute"
text.style.left=dog.offsetLeft+"px"
text.style.bottom="180px"

document.body.appendChild(text)

setTimeout(()=>text.remove(),800)

}

function spawnFlag(){

let flag=document.createElement("div")

flag.style.position="absolute"
flag.style.left=(nextSpawn+200)+"px"
flag.style.bottom="80px"
flag.style.fontSize="70px"

flag.innerText="🏁"

world.appendChild(flag)

}

function loop(){

if(!paused){

if(moving) worldX-=4

vy-=0.6

let bottom=parseFloat(player.style.bottom||80)
bottom+=vy

if(bottom<=80){
bottom=80
vy=0
onGround=true
}

player.style.bottom=bottom+"px"

dog.style.left=(player.offsetLeft-100)+"px"

world.style.left=worldX+"px"

if(-worldX+window.innerWidth>nextSpawn-1000){

spawnDecoration()

if(!finished) spawnObstacle()

}

const pr=player.getBoundingClientRect()

document.querySelectorAll(".obstacle").forEach(o=>{

const r=o.getBoundingClientRect()

if(pr.right>r.left && pr.left<r.right){

showMath()
o.remove()

}

})

}

requestAnimationFrame(loop)

}

loop()

document.getElementById("photo").addEventListener("change",async e=>{

const file=e.target.files[0]

const result=await Tesseract.recognize(file,"eng")

let found=result.data.text.match(/\d+\s*\+\s*\d+/g)

if(found) tasks=found

})

</script>

</body>
</html>
